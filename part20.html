<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR BOARD · FINAL · 100%</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ========== ENTERPRISE ULTIMATE FINAL DESIGN (1:1) ========== */
        :root {
            --bg-base: #020617;
            --bg-canvas: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --brand-primary: #0a84ff;
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --shadow-float: 0 24px 48px -12px rgba(0,0,0,0.5);
            --shadow-glass: inset 0 1px 1px rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg-base);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
        }

        .final-stage {
            text-align: center;
            z-index: 10;
        }

        /* YAKUNIY KARTOCHKA (Sizning panel dizayningizda) */
        .end-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(40px);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: var(--shadow-float), var(--shadow-glass);
            opacity: 0;
            transform: translateY(40px) scale(0.9);
            animation: cardPop 1s var(--ease-spring) 0.5s forwards;
        }

        @keyframes cardPop {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .the-end {
            font-size: 82px;
            font-weight: 900;
            letter-spacing: -4px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .credits {
            font-size: 18px;
            font-weight: 700;
            color: var(--brand-primary);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 40px;
        }

        .author-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* PROGRESS BAR 100% (Sizning kodingizdan) */
        .progress-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            text-align: center;
        }
        .progress-track {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: var(--brand-primary);
            width: 98%;
            animation: complete 2s ease-out forwards;
        }
        .progress-text {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--brand-primary);
            text-transform: uppercase;
        }

        @keyframes complete {
            to { width: 100%; box-shadow: 0 0 20px var(--brand-primary); }
        }

        /* FONDAKI EFFEKT */
        .glow {
            position: absolute;
            width: 400px; height: 400px;
            background: var(--brand-primary);
            filter: blur(150px);
            opacity: 0.15;
            border-radius: 50%;
            animation: pulseGlow 4s infinite alternate;
        }

        @keyframes pulseGlow {
            from { transform: scale(1); opacity: 0.1; }
            to { transform: scale(1.3); opacity: 0.2; }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="final-stage">
        <div class="end-card">
            <h1 class="the-end">THE END</h1>
            <p class="credits">Project Completed</p>
            <div class="author-info">
                <i data-lucide="code-2" size="20"></i>
                <span>Enterprise Ultimate Edition</span>
                <i data-lucide="check-circle-2" size="20" style="color: #34c759;"></i>
            </div>
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>
        <p class="progress-text">System Ready · 100%</p>
    </div>

  <script>
    lucide.createIcons();
    
    // Progress bar animatsiyasi 2 soniyada 100% ga to'ladi
    // 2.5 soniyadan keyin next xabarini yuboramiz (animatsiya tugagach)
    setTimeout(() => {
        window.parent.postMessage('next', '*');
    }, 2500);
    
    // Konsolga yozamiz (debug uchun)
    console.log("MR BOARD Part 20: Final scene - sending next signal");
</script>
</body>
</html>
