<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>MR Board · Studio</title>
    <link rel="icon" type="image/png" href="mr.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/roughjs@latest/bundled/rough.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #14141a;
            --surface-light: #1e1e26;
            --border: #2a2a32;
            --accent: #3b82f6;
            --text: #ffffff;
            --text-muted: #8b8b98;
        }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            color: var(--text);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: crosshair;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* ========== WELCOME ========== */
        #welcome-page {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 2000;
            padding: 20px;
        }

        .welcome-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 380px;
        }

        .welcome-card h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 28px;
            text-align: center;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            border-radius: 40px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-secondary { background: var(--surface-light); border: 1px solid var(--border); color: var(--text); }
        .btn-secondary:active { transform: scale(0.97); }

        .input-field {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            outline: none;
            margin-bottom: 14px;
        }
        .input-field:focus { border-color: var(--accent); }
        .divider { height: 1px; background: var(--border); margin: 24px 0; }

        /* ========== APP ========== */
        #app-page {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* ========== TOP STATUS ========== */
        .top-status {
            position: fixed;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            z-index: 50;
            pointer-events: none;
        }
        .status-chip {
            background: rgba(20, 20, 26, 0.7);
            backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            pointer-events: auto;
            border: 1px solid var(--border);
        }

        /* ========== BOTTOM BAR ========== */
        .bottom-bar {
            position: fixed;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: rgba(20, 20, 26, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }
        .bar-left, .bar-right { display: flex; align-items: center; gap: 12px; }
        .bar-center { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 40px; }
        .bar-btn {
            width: 44px;
            height: 44px;
            border-radius: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
        }
        .bar-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.05); }
        .bar-btn.active { color: var(--accent); background: rgba(59,130,246,0.15); }
        .color-indicator { width: 32px; height: 32px; border-radius: 32px; border: 2px solid var(--border); cursor: pointer; }

        /* ========== VOICE WAVES ========== */
        .voice-wave-container {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 44px;
            padding: 0 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 44px;
        }
        .wave-group {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 32px;
        }
        .wave-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 2px;
            transition: height 0.08s ease-out;
        }
        .voice-level-text {
            font-size: 10px;
            color: var(--text-muted);
            margin-left: 8px;
            min-width: 45px;
            font-family: monospace;
        }
        .mic-active .wave-bar { background: #22c55e; }
        .mic-active .voice-level-text { color: #22c55e; }

        /* ========== SIDE MENU (LEFT SIDE) ========== */
        .side-menu {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            width: 100%;
            max-width: 100%;
            background: rgba(20, 20, 26, 0.98);
            backdrop-filter: blur(24px);
            border-right: 1px solid var(--border);
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow-y: auto;
            padding: 20px 0;
        }
        .side-menu.open { transform: translateX(0); }
        
        /* Desktopda 50% */
        @media (min-width: 769px) {
            .side-menu { width: 50%; max-width: 50%; }
            .side-menu .close-side-btn { display: none; }
        }
        
        .menu-header { 
            padding: 20px 24px; 
            font-size: 18px; 
            font-weight: 600; 
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-side-btn {
            width: 32px;
            height: 32px;
            border-radius: 32px;
            background: var(--surface-light);
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-side-btn:active { transform: scale(0.92); }
        
        .menu-section { padding: 16px 24px; border-bottom: 1px solid var(--border); }
        .menu-section-title { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }
        .tools-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .tool-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px;
            background: var(--surface-light);
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .tool-card:active { transform: scale(0.96); }
        .tool-card.active { border-color: var(--accent); background: rgba(59,130,246,0.1); color: var(--accent); }
        .colors-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .color-ball {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            cursor: pointer;
            border: 2px solid var(--border);
        }
        .color-ball.active { border-color: white; transform: scale(1.05); }
        .slider-studio { width: 100%; height: 4px; -webkit-appearance: none; background: var(--border); border-radius: 4px; }
        .slider-studio::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 16px; background: var(--accent); cursor: pointer; }

        /* ========== CHAT PANEL (RIGHT SIDE) ========== */
        .chat-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            max-width: 100%;
            background: rgba(20, 20, 26, 0.98);
            backdrop-filter: blur(24px);
            border-left: 1px solid var(--border);
            z-index: 250;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
        }
        .chat-panel.open { transform: translateX(0); }
        
        /* Desktopda 50% */
        @media (min-width: 769px) {
            .chat-panel { width: 50%; max-width: 50%; }
            .chat-panel .close-chat { display: none; }
        }
        
        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h3 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .close-chat {
            width: 36px;
            height: 36px;
            border-radius: 36px;
            background: var(--surface-light);
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-chat:active { transform: scale(0.92); }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 13px;
            word-break: break-word;
        }
        .chat-message.own {
            background: var(--accent);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-message.other {
            background: var(--surface-light);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .chat-message .sender { font-size: 10px; font-weight: 600; margin-bottom: 4px; color: var(--text-muted); }
        .chat-message.own .sender { color: rgba(255,255,255,0.7); }
        .chat-message .time { font-size: 9px; color: var(--text-muted); margin-top: 4px; text-align: right; }
        .chat-input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }
        .chat-input-area input:focus { border-color: var(--accent); }
        .chat-input-area button {
            width: 44px;
            height: 44px;
            border-radius: 44px;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== OTHER ========== */
        .student-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .perm-icon { width: 36px; height: 36px; border-radius: 18px; background: var(--surface-light); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); }
        .perm-icon.active { background: rgba(59,130,246,0.2); color: var(--accent); }
        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 150;
            display: none;
        }
        .menu-overlay.show { display: block; }
        #textInputOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #textInputOverlay.show { display: flex; }
        .text-input-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }
        .text-input-card textarea {
            width: 100%;
            padding: 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            font-size: 16px;
            resize: none;
            outline: none;
            margin-bottom: 16px;
        }
        .text-actions { display: flex; gap: 12px; justify-content: flex-end; }
        .text-actions button { padding: 10px 20px; border-radius: 30px; border: none; cursor: pointer; }
        #audioContainer { display: none; }

        /* ========== MOBILE RESPONSIVE ========== */
        @media (max-width: 768px) {
            .bar-center { display: none; }
            .voice-wave-container { padding: 0 4px; }
            .wave-group { gap: 2px; }
            /* Mobile da barcha side panellar 100% */
            .side-menu, .chat-panel {
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div id="audioContainer"></div>

<div id="welcome-page">
    <div class="welcome-card">
        <h1>MR Board</h1>
        <input type="text" id="userName" class="input-field" placeholder="Ismingiz">
        <button class="btn btn-primary" id="createRoomBtn"><i data-lucide="plus"></i> Yangi xona</button>
        <div class="divider"></div>
        <input type="text" id="roomInput" class="input-field" placeholder="Xona kodi">
        <button class="btn btn-secondary" id="joinRoomBtn"><i data-lucide="log-in"></i> Xonaga kirish</button>
    </div>
</div>

<div id="app-page">
    <canvas id="canvas"></canvas>

    <div class="top-status">
        <div class="status-chip" id="roomIdTop">---</div>
        <div class="status-chip" id="zoomTop">100%</div>
        <div class="status-chip" id="roleTop">Kuzatuvchi</div>
    </div>

    <div class="bottom-bar">
        <div class="bar-left">
            <div class="color-indicator" id="colorIndicator"></div>
            <button class="bar-btn" id="toolsBtn"><i data-lucide="brush" size="20"></i></button>
            <button class="bar-btn" id="colorsBtn"><i data-lucide="palette" size="20"></i></button>
        </div>
        <div class="bar-center">
            <button class="bar-btn" data-tool="draw"><i data-lucide="pencil" size="18"></i></button>
            <button class="bar-btn" data-tool="erase"><i data-lucide="eraser" size="18"></i></button>
            <button class="bar-btn" data-tool="pan"><i data-lucide="hand" size="18"></i></button>
            <button class="bar-btn" data-tool="text"><i data-lucide="type" size="18"></i></button>
            <div style="width:1px; height:24px; background:var(--border); margin:0 4px;"></div>
            <button class="bar-btn" id="undoBtn"><i data-lucide="undo-2" size="18"></i></button>
        </div>
        <div class="bar-right">
            <div class="voice-wave-container" id="voiceWaveContainer">
                <div class="wave-group" id="waveGroup">
                    <div class="wave-bar" style="height: 8px;"></div>
                    <div class="wave-bar" style="height: 12px;"></div>
                    <div class="wave-bar" style="height: 18px;"></div>
                    <div class="wave-bar" style="height: 14px;"></div>
                    <div class="wave-bar" style="height: 10px;"></div>
                    <div class="wave-bar" style="height: 6px;"></div>
                    <div class="wave-bar" style="height: 16px;"></div>
                    <div class="wave-bar" style="height: 20px;"></div>
                    <div class="wave-bar" style="height: 12px;"></div>
                    <div class="wave-bar" style="height: 8px;"></div>
                </div>
                <span class="voice-level-text" id="voiceLevelText">-∞ dB</span>
            </div>
            <button class="bar-btn" id="micBtn"><i data-lucide="mic-off" size="18"></i></button>
            <button class="bar-btn" id="chatBtn"><i data-lucide="message-square" size="18"></i></button>
            <button class="bar-btn" id="studentsBtn"><i data-lucide="users" size="18"></i><span id="studentBadge" style="position:absolute; top:-2px; right:-2px; background:var(--accent); font-size:10px; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center;">0</span></button>
            <button class="bar-btn" id="exportBtn"><i data-lucide="download" size="18"></i></button>
            <button class="bar-btn" id="exitBtn"><i data-lucide="log-out" size="18"></i></button>
        </div>
    </div>

    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- LEFT SIDE MENUS -->
    <div class="side-menu" id="toolsMenu">
        <div class="menu-header">
            <span>Asboblar</span>
            <button class="close-side-btn" id="closeToolsBtn"><i data-lucide="x" size="18"></i></button>
        </div>
        <div class="menu-section">
            <div class="tools-grid">
                <div class="tool-card" data-tool="draw"><i data-lucide="pencil" size="28"></i><span>Qalam</span></div>
                <div class="tool-card" data-tool="erase"><i data-lucide="eraser" size="28"></i><span>O'chirg'ich</span></div>
                <div class="tool-card" data-tool="pan"><i data-lucide="hand" size="28"></i><span>Surish</span></div>
                <div class="tool-card" data-tool="text"><i data-lucide="type" size="28"></i><span>Matn</span></div>
            </div>
        </div>
        <div class="menu-section">
            <div class="menu-section-title">Qalinlik</div>
            <input type="range" id="penSizeSlider" class="slider-studio" min="1" max="20" value="4">
            <div style="text-align:center; margin-top:12px;"><span id="sizeValue">4</span>px</div>
        </div>
        <div class="menu-section">
            <div class="menu-section-title">Amallar</div>
            <div class="tools-grid">
                <div class="tool-card" id="undoMenuBtn"><i data-lucide="undo-2" size="24"></i><span>Bekor</span></div>
                <div class="tool-card" id="uploadImageMenuBtn"><i data-lucide="image" size="24"></i><span>Rasm</span></div>
                <div class="tool-card" id="centerViewMenuBtn"><i data-lucide="target" size="24"></i><span>Markaz</span></div>
            </div>
        </div>
        <div class="menu-section" id="teacherToolsMenu" style="display:none;">
            <div class="menu-section-title">O'qituvchi</div>
            <div class="tools-grid">
                <div class="tool-card" id="clearBoardMenuBtn"><i data-lucide="trash-2" size="24"></i><span>Tozalash</span></div>
            </div>
        </div>
    </div>

    <div class="side-menu" id="colorsMenu">
        <div class="menu-header">
            <span>Ranglar</span>
            <button class="close-side-btn" id="closeColorsBtn"><i data-lucide="x" size="18"></i></button>
        </div>
        <div class="menu-section">
            <div class="colors-grid" id="colorGridMenu"></div>
            <input type="color" id="colorPickerMenu" value="#3b82f6" style="width:100%; height:48px; border-radius:40px; margin-top:12px;">
        </div>
    </div>

    <div class="side-menu" id="studentsMenu">
        <div class="menu-header">
            <span>O'quvchilar</span>
            <button class="close-side-btn" id="closeStudentsBtn"><i data-lucide="x" size="18"></i></button>
        </div>
        <div class="menu-section"><div id="studentListMenu"></div></div>
    </div>

    <!-- RIGHT SIDE CHAT PANEL -->
    <div class="chat-panel" id="chatPanel">
        <div class="chat-header">
            <h3><i data-lucide="message-square" size="18"></i> Guruh chat</h3>
            <button class="close-chat" id="closeChatBtn"><i data-lucide="x" size="18"></i></button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Xabar yozing..." maxlength="500">
            <button id="sendChatBtn"><i data-lucide="send" size="18"></i></button>
        </div>
    </div>

    <div id="textInputOverlay">
        <div class="text-input-card">
            <textarea id="textInputArea" rows="3" placeholder="Matnni kiriting..."></textarea>
            <div class="text-actions">
                <button class="btn-secondary" id="cancelTextBtn">Bekor</button>
                <button class="btn-primary" id="addTextBtn">Qo'shish</button>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDvbG7fChb2LN_nJhwTF1iMKMXNPcuGk5Y",
        databaseURL: "https://tictactoe-26434-default-rtdb.firebaseio.com",
        projectId: "tictactoe-26434"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    lucide.createIcons();

    // ========== STATE ==========
    const State = {
        userId: 'u_' + Math.random().toString(36).substr(2, 8),
        userName: '',
        roomId: '',
        roomRef: null,
        isTeacher: false,
        canDraw: false,
        canSpeak: false,
        tool: 'draw',
        color: '#3b82f6',
        penSize: 4,
        camera: { x: 0, y: 0, zoom: 1.2 },
        isDrawing: false,
        lastPoint: { x: 0, y: 0 },
        elements: [],
        activePaths: {},
        students: {},
        cursors: {},
        rc: null,
        textPosition: null
    };

    const presetColors = ['#ffffff', '#000000', '#ef4444', '#f59e0b', '#3b82f6', '#22c55e', '#a855f7', '#ec489a'];

    // ========== CANVAS ==========
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        render();
    }
    window.addEventListener('resize', resizeCanvas);

    function screenToWorld(x, y) { 
        return { x: (x - State.camera.x) / State.camera.zoom, y: (y - State.camera.y) / State.camera.zoom }; 
    }
    function worldToScreen(x, y) { 
        return { x: x * State.camera.zoom + State.camera.x, y: y * State.camera.zoom + State.camera.y }; 
    }

    function drawPath(points, color, size) {
        if (!points || points.length < 2) return;
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = size;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.stroke();
    }

    function render() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = '#1f1f24';
        ctx.lineWidth = 1;
        const gs = 40 * State.camera.zoom;
        const ox = State.camera.x % gs;
        const oy = State.camera.y % gs;
        for (let x = ox; x < canvas.width; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
        for (let y = oy; y < canvas.height; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
        
        ctx.setTransform(State.camera.zoom, 0, 0, State.camera.zoom, State.camera.x, State.camera.y);
        
        State.elements.forEach(el => {
            if (el.type === 'path' && el.points?.length > 1) drawPath(el.points, el.color, el.size);
            else if (el.type === 'text') {
                ctx.font = `600 ${el.size || 24}px ${el.font || 'Inter'}`;
                ctx.fillStyle = el.color || '#ffffff';
                ctx.fillText(el.text, el.x, el.y);
            }
            else if (el.type === 'image' && el.data) { const img = new Image(); img.src = el.data; ctx.drawImage(img, el.x, el.y, el.width, el.height); }
        });
        
        Object.values(State.activePaths).forEach(p => { if (p && p.points && p.points.length > 1) drawPath(p.points, p.color, p.size); });
        
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        Object.entries(State.cursors).forEach(([uid, data]) => {
            if (uid === State.userId || !data || typeof data.x !== 'number') return;
            const pos = worldToScreen(data.x, data.y);
            ctx.beginPath(); ctx.arc(pos.x, pos.y, 5, 0, Math.PI*2);
            ctx.fillStyle = data.isTeacher ? '#3b82f6' : '#ef4444';
            ctx.fill();
        });
        
        document.getElementById('zoomTop').innerText = Math.round(State.camera.zoom * 100) + '%';
    }
    
    function renderLoop() { render(); requestAnimationFrame(renderLoop); }

    // ========== AUDIO ==========
    const Audio = {
        stream: null,
        audioContext: null,
        analyser: null,
        source: null,
        animationId: null,
        
        async init() {
            try {
                this.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                this.setupVisualizer();
                this.updateUI();
            } catch(e) { console.log("Mikrofon ruxsati kerak:", e); }
        },
        
        setupVisualizer() {
            if (this.audioContext) this.audioContext.close();
            this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            this.analyser = this.audioContext.createAnalyser();
            this.analyser.fftSize = 256;
            this.source = this.audioContext.createMediaStreamSource(this.stream);
            this.source.connect(this.analyser);
            
            const dataArray = new Uint8Array(this.analyser.frequencyBinCount);
            const waveBars = document.querySelectorAll('.wave-bar');
            const levelText = document.getElementById('voiceLevelText');
            const container = document.getElementById('voiceWaveContainer');
            
            const updateWaves = () => {
                if (!State.canSpeak || !this.analyser) {
                    waveBars.forEach(bar => bar.style.height = '4px');
                    if (levelText) levelText.innerText = 'muted';
                    if (container) container.classList.remove('mic-active');
                    this.animationId = requestAnimationFrame(updateWaves);
                    return;
                }
                
                this.analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                let avg = sum / dataArray.length;
                let db = Math.round(20 * Math.log10(avg / 255 + 0.1));
                if (db < -60) db = -60;
                if (db > 0) db = 0;
                
                const normalizedLevel = Math.min(1, avg / 180);
                
                if (levelText) {
                    if (avg < 5) levelText.innerText = '-∞ dB';
                    else levelText.innerText = `${db} dB`;
                }
                
                if (container) {
                    if (avg > 15) container.classList.add('mic-active');
                    else container.classList.remove('mic-active');
                }
                
                waveBars.forEach((bar, index) => {
                    const factor = 0.5 + (index / waveBars.length) * 1.5;
                    let height = 4 + (normalizedLevel * 28 * factor);
                    height = Math.min(32, Math.max(4, height));
                    bar.style.height = height + 'px';
                });
                
                this.animationId = requestAnimationFrame(updateWaves);
            };
            updateWaves();
        },
        
        updateUI() {
            if (this.stream) {
                const track = this.stream.getAudioTracks()[0];
                if (track) track.enabled = State.canSpeak;
                const micBtn = document.getElementById('micBtn');
                if (micBtn) {
                    const icon = micBtn.querySelector('i');
                    if (State.canSpeak) {
                        icon.setAttribute('data-lucide', 'mic');
                        micBtn.style.color = '#22c55e';
                    } else {
                        icon.setAttribute('data-lucide', 'mic-off');
                        micBtn.style.color = '';
                    }
                    lucide.createIcons();
                }
            }
        },
        
        stop() {
            if (this.animationId) cancelAnimationFrame(this.animationId);
            if (this.audioContext) this.audioContext.close();
        }
    };

    // ========== CHAT ==========
    const Chat = {
        sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !State.roomRef) return;
            State.roomRef.child('chat').push({
                id: Date.now(),
                userId: State.userId,
                userName: State.userName,
                text: text,
                time: new Date().toLocaleTimeString(),
                isTeacher: State.isTeacher
            });
            input.value = '';
        },
        addMessage(msg) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `chat-message ${msg.userId === State.userId ? 'own' : 'other'}`;
            div.innerHTML = `<div class="sender">${msg.userName} ${msg.isTeacher ? '👑' : ''}</div><div>${msg.text}</div><div class="time">${msg.time}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        },
        listen() {
            if (!State.roomRef) return;
            State.roomRef.child('chat').on('child_added', (snap) => { this.addMessage(snap.val()); });
        }
    };

    // ========== DATABASE ==========
    const DB = {
        init(id) {
            State.roomId = id;
            State.roomRef = db.ref('mr_rooms_final/' + id);
            document.getElementById('welcome-page').style.display = 'none';
            document.getElementById('app-page').style.display = 'block';
            document.getElementById('roomIdTop').innerText = id;
            if (State.isTeacher) { State.canDraw = true; State.canSpeak = true; }
            this.register();
            this.listen();
            resizeCanvas();
            renderLoop();
            Audio.init();
            Chat.listen();
            UI.updateUI();
        },
        register() {
            const ref = State.roomRef.child('students').child(State.userId);
            ref.onDisconnect().remove();
            ref.set({ id: State.userId, name: State.userName, isTeacher: State.isTeacher, canDraw: State.canDraw, canSpeak: State.canSpeak });
        },
        listen() {
            State.roomRef.child('elements').on('value', snap => { State.elements = Object.values(snap.val() || {}); });
            State.roomRef.child('active').on('value', snap => { State.activePaths = snap.val() || {}; });
            State.roomRef.child('students').on('value', snap => {
                State.students = snap.val() || {};
                if (!State.isTeacher && State.students[State.userId]) {
                    const me = State.students[State.userId];
                    if (State.canDraw !== me.canDraw) State.canDraw = me.canDraw;
                    if (State.canSpeak !== me.canSpeak) { State.canSpeak = me.canSpeak; Audio.updateUI(); }
                    UI.updateUI();
                }
                UI.renderStudents();
                const count = Object.values(State.students).filter(s => !s.isTeacher).length;
                const badge = document.getElementById('studentBadge');
                if (badge) badge.innerText = count;
            });
            State.roomRef.child('presence').on('value', snap => { State.cursors = snap.val() || {}; });
            if (!State.isTeacher) State.roomRef.child('camera').on('value', snap => { const cam = snap.val(); if (cam && !State.canDraw) State.camera = cam; });
        },
        setActive(id, data) { State.roomRef.child('active/' + id).set(data); },
        updateActive(id, points) { State.roomRef.child('active/' + id).update({ points }); },
        removeActive(id) { State.roomRef.child('active/' + id).remove(); },
        saveElement(el) { State.roomRef.child('elements').push(el); },
        updateCursor(pos) { State.roomRef.child('presence/' + State.userId).set({ x: pos.x, y: pos.y, name: State.userName, isTeacher: State.isTeacher }); },
        syncCamera() { State.roomRef.child('camera').set(State.camera); },
        clearBoard() { if (confirm("Doskani tozalansinmi?")) State.roomRef.child('elements').remove(); },
        togglePerm(id, type, val) { State.roomRef.child('students/' + id).update({ [type]: val }); }
    };

    // ========== CANVAS ACTIONS ==========
    const CanvasActions = {
        setTool(tool) {
            State.tool = tool;
            document.querySelectorAll('[data-tool]').forEach(el => el.classList.remove('active'));
            document.querySelectorAll(`[data-tool="${tool}"]`).forEach(el => el.classList.add('active'));
            if (tool === 'text') { UI.openTextInput(); }
        },
        addText() {
            const text = document.getElementById('textInputArea').value.trim();
            if (text && State.textPosition) {
                DB.saveElement({ type: 'text', id: 'txt_' + Date.now(), text: text, x: State.textPosition.x, y: State.textPosition.y, size: 24, color: State.color, font: 'Inter' });
                State.textPosition = null;
            }
            UI.closeTextInput();
        },
        centerView() { State.camera = { x: 0, y: 0, zoom: 1.2 }; if (State.isTeacher) DB.syncCamera(); },
        uploadImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file || file.size > 5e6) return alert("Rasm 5MB dan kichik bo'lishi kerak");
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const center = screenToWorld(window.innerWidth / 2, window.innerHeight / 2);
                        const w = Math.min(300, img.width) / State.camera.zoom;
                        const h = (img.height / img.width) * w;
                        DB.saveElement({ type: 'image', id: 'img_' + Date.now(), data: ev.target.result, x: center.x - w/2, y: center.y - h/2, width: w, height: h });
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        },
        exportPNG() { const a = document.createElement('a'); a.download = 'mr-board.png'; a.href = canvas.toDataURL(); a.click(); },
        undo() { if (State.roomRef) State.roomRef.child('elements').orderByKey().limitToLast(1).once('value', snap => { snap.forEach(c => c.ref.remove()); }); }
    };

    // ========== UI ==========
    const UI = {
        toggleMic() {
            if (!State.isTeacher && !State.canSpeak) { alert("O'qituvchi ruxsat bermagan"); return; }
            State.canSpeak = !State.canSpeak;
            if (Audio.stream) { const track = Audio.stream.getAudioTracks()[0]; if (track) track.enabled = State.canSpeak; }
            if (State.isTeacher) DB.togglePerm(State.userId, 'canSpeak', State.canSpeak);
            Audio.updateUI();
        },
        openMenu(name) {
            document.querySelectorAll('.side-menu').forEach(m => m.classList.remove('open'));
            document.getElementById('menuOverlay').classList.add('show');
            document.getElementById(name + 'Menu').classList.add('open');
        },
        closeAll() {
            document.querySelectorAll('.side-menu').forEach(m => m.classList.remove('open'));
            document.getElementById('chatPanel').classList.remove('open');
            document.getElementById('menuOverlay').classList.remove('show');
        },
        openChat() { 
            document.querySelectorAll('.side-menu').forEach(m => m.classList.remove('open'));
            document.getElementById('menuOverlay').classList.add('show');
            document.getElementById('chatPanel').classList.add('open'); 
        },
        closeChat() { 
            document.getElementById('chatPanel').classList.remove('open');
            document.getElementById('menuOverlay').classList.remove('show');
        },
        openTextInput() { document.getElementById('textInputOverlay').classList.add('show'); },
        closeTextInput() { document.getElementById('textInputOverlay').classList.remove('show'); document.getElementById('textInputArea').value = ''; },
        updateUI() {
            const studentsBtn = document.getElementById('studentsBtn');
            const teacherMenu = document.getElementById('teacherToolsMenu');
            const role = document.getElementById('roleTop');
            if (studentsBtn) studentsBtn.style.display = State.isTeacher ? 'flex' : 'none';
            if (teacherMenu) teacherMenu.style.display = State.isTeacher ? 'block' : 'none';
            if (role) {
                if (State.isTeacher) role.innerText = '👑 O\'qituvchi';
                else if (State.canDraw) role.innerText = '✏️ Chizish ruxsati bor';
                else role.innerText = '👁️ Kuzatuvchi';
            }
        },
        renderStudents() {
            const container = document.getElementById('studentListMenu');
            if (!container) return;
            container.innerHTML = '';
            Object.values(State.students).forEach(st => {
                if (st.isTeacher) return;
                const drawActive = st.canDraw ? 'active' : '';
                const speakActive = st.canSpeak ? 'active' : '';
                container.innerHTML += `<div class="student-item"><span>${st.name}</span><div style="display:flex; gap:8px;"><div class="perm-icon ${drawActive}" data-draw="${st.id}"><i data-lucide="pen-tool" size="14"></i></div><div class="perm-icon ${speakActive}" data-speak="${st.id}"><i data-lucide="mic" size="14"></i></div></div></div>`;
            });
            lucide.createIcons();
            document.querySelectorAll('[data-draw]').forEach(el => { el.onclick = () => DB.togglePerm(el.dataset.draw, 'canDraw', !State.students[el.dataset.draw]?.canDraw); });
            document.querySelectorAll('[data-speak]').forEach(el => { el.onclick = () => DB.togglePerm(el.dataset.speak, 'canSpeak', !State.students[el.dataset.speak]?.canSpeak); });
        }
    };

    // ========== POINTER EVENTS ==========
    function handleStart(e) {
        const x = e.clientX || (e.touches?.[0]?.clientX);
        const y = e.clientY || (e.touches?.[0]?.clientY);
        if (!x) return;
        if (State.tool === 'text') { State.textPosition = screenToWorld(x, y); UI.openTextInput(); return; }
        State.isDrawing = true;
        const world = screenToWorld(x, y);
        State.lastPoint = { x, y };
        if (State.tool === 'draw' || State.tool === 'erase') {
            const id = State.userId + '_' + Date.now();
            const color = State.tool === 'erase' ? '#0a0a0f' : State.color;
            const size = (State.tool === 'erase' ? 30 : State.penSize) / State.camera.zoom;
            DB.setActive(id, { userId: State.userId, points: [world], color, size });
        }
    }
    
    function handleMove(e) {
        const x = e.clientX || (e.touches?.[0]?.clientX);
        const y = e.clientY || (e.touches?.[0]?.clientY);
        if (!x) return;
        const world = screenToWorld(x, y);
        DB.updateCursor(world);
        if (!State.isDrawing) return;
        if (State.tool === 'pan') { 
            State.camera.x += x - State.lastPoint.x; 
            State.camera.y += y - State.lastPoint.y; 
            State.lastPoint = { x, y }; 
        } else if (State.canDraw && (State.tool === 'draw' || State.tool === 'erase')) {
            const keys = Object.keys(State.activePaths).filter(k => State.activePaths[k]?.userId === State.userId);
            if (keys.length) {
                const p = State.activePaths[keys[0]];
                if (p && p.points) {
                    const last = p.points[p.points.length - 1];
                    if (Math.hypot(world.x - last.x, world.y - last.y) > 2) { 
                        p.points.push(world); 
                        DB.updateActive(keys[0], p.points); 
                    }
                }
            }
        }
        State.lastPoint = { x, y };
    }
    
    function handleEnd() {
        if (!State.isDrawing) return;
        State.isDrawing = false;
        if (State.canDraw && (State.tool === 'draw' || State.tool === 'erase')) {
            const keys = Object.keys(State.activePaths).filter(k => State.activePaths[k]?.userId === State.userId);
            if (keys.length) {
                const p = State.activePaths[keys[0]];
                if (p && p.points && p.points.length > 1) DB.saveElement({ type: 'path', points: p.points, color: p.color, size: p.size });
                DB.removeActive(keys[0]);
            }
        }
    }
    
    canvas.addEventListener('pointerdown', handleStart);
    window.addEventListener('pointermove', handleMove);
    window.addEventListener('pointerup', handleEnd);
    
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const world = screenToWorld(e.clientX, e.clientY);
        State.camera.zoom *= e.deltaY > 0 ? 0.9 : 1.1;
        State.camera.zoom = Math.min(5, Math.max(0.3, State.camera.zoom));
        State.camera.x = e.clientX - world.x * State.camera.zoom;
        State.camera.y = e.clientY - world.y * State.camera.zoom;
        if (State.isTeacher) DB.syncCamera();
    }, { passive: false });

    // ========== INIT UI ==========
    function initUIElements() {
        const colorGrid = document.getElementById('colorGridMenu');
        presetColors.forEach(c => {
            const ball = document.createElement('div');
            ball.className = 'color-ball';
            ball.style.backgroundColor = c;
            ball.onclick = () => {
                State.color = c;
                document.querySelectorAll('#colorGridMenu .color-ball').forEach(s => s.classList.remove('active'));
                ball.classList.add('active');
                document.getElementById('colorPickerMenu').value = c;
                document.getElementById('colorIndicator').style.backgroundColor = c;
            };
            if (c === State.color) ball.classList.add('active');
            colorGrid.appendChild(ball);
        });
        
        const penSlider = document.getElementById('penSizeSlider');
        if (penSlider) {
            penSlider.addEventListener('input', (e) => { State.penSize = parseInt(e.target.value); document.getElementById('sizeValue').innerText = State.penSize; });
        }
        
        const colorPicker = document.getElementById('colorPickerMenu');
        if (colorPicker) {
            colorPicker.addEventListener('input', (e) => { State.color = e.target.value; document.getElementById('colorIndicator').style.backgroundColor = e.target.value; });
        }
        
        document.getElementById('colorIndicator').style.backgroundColor = State.color;
        
        // Close buttons
        document.getElementById('closeToolsBtn').onclick = () => UI.closeAll();
        document.getElementById('closeColorsBtn').onclick = () => UI.closeAll();
        document.getElementById('closeStudentsBtn').onclick = () => UI.closeAll();
        document.getElementById('closeChatBtn').onclick = () => UI.closeChat();
    }

    // ========== EVENT LISTENERS ==========
    document.getElementById('createRoomBtn').onclick = () => {
        const name = document.getElementById('userName').value.trim();
        if (!name) return alert("Ismingizni kiriting");
        State.userName = name;
        State.isTeacher = true;
        DB.init('MR' + Math.floor(1000 + Math.random() * 9000));
    };
    
    document.getElementById('joinRoomBtn').onclick = () => {
        const name = document.getElementById('userName').value.trim();
        const id = document.getElementById('roomInput').value.trim().toUpperCase();
        if (!name) return alert("Ismingizni kiriting");
        if (!id) return alert("Xona kodini kiriting");
        State.userName = name;
        State.isTeacher = false;
        DB.init(id);
    };
    
    document.getElementById('toolsBtn').onclick = () => UI.openMenu('tools');
    document.getElementById('colorsBtn').onclick = () => UI.openMenu('colors');
    document.getElementById('studentsBtn').onclick = () => UI.openMenu('students');
    document.getElementById('chatBtn').onclick = () => UI.openChat();
    document.getElementById('sendChatBtn').onclick = () => Chat.sendMessage();
    document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') Chat.sendMessage(); });
    document.getElementById('menuOverlay').onclick = () => UI.closeAll();
    document.getElementById('micBtn').onclick = () => UI.toggleMic();
    document.getElementById('undoBtn').onclick = () => CanvasActions.undo();
    document.getElementById('undoMenuBtn').onclick = () => { CanvasActions.undo(); UI.closeAll(); };
    document.getElementById('uploadImageMenuBtn').onclick = () => { CanvasActions.uploadImage(); UI.closeAll(); };
    document.getElementById('centerViewMenuBtn').onclick = () => { CanvasActions.centerView(); UI.closeAll(); };
    document.getElementById('clearBoardMenuBtn').onclick = () => { DB.clearBoard(); UI.closeAll(); };
    document.getElementById('exportBtn').onclick = () => CanvasActions.exportPNG();
    document.getElementById('exitBtn').onclick = () => location.reload();
    document.getElementById('cancelTextBtn').onclick = () => UI.closeTextInput();
    document.getElementById('addTextBtn').onclick = () => CanvasActions.addText();
    
    document.querySelectorAll('[data-tool]').forEach(btn => { btn.onclick = () => CanvasActions.setTool(btn.dataset.tool); });
    document.querySelectorAll('#toolsMenu .tool-card[data-tool]').forEach(card => { card.onclick = () => { CanvasActions.setTool(card.dataset.tool); UI.closeAll(); }; });

    initUIElements();
    window.Canvas = CanvasActions;
    window.DB = DB;
    window.UI = UI;
})();
</script>
