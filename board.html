<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a" id="theme-color">
    <title>MR BOARD · ENTERPRISE · ULTIMATE</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --bg-base: #f8fafc;
            --bg-canvas: #e2e8f0;
            --bg-glass: rgba(255, 255, 255, 0.65);
            --bg-panel: rgba(255, 255, 255, 0.85);
            --bg-hover: rgba(0, 0, 0, 0.05);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-subtle: rgba(255, 255, 255, 0.4);
            --border-strong: rgba(0, 0, 0, 0.1);
            --brand-primary: #007aff;
            --brand-alpha: rgba(0, 122, 255, 0.15);
            --state-danger: #ff3b30;
            --state-success: #34c759;
            --state-warning: #ffcc00;
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.25, 1, 0.5, 1);
            --duration-fast: 200ms;
            --duration-base: 400ms;
            --shadow-float: 0 24px 48px -12px rgba(0,0,0,0.15);
            --shadow-glass: inset 0 1px 1px rgba(255,255,255,0.8);
            --z-canvas: 10;
            --z-ui: 100;
            --z-minimap: 150;
            --z-overlay: 200;
            --z-modal: 300;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-base: #020617;
                --bg-canvas: #0f172a;
                --bg-glass: rgba(15, 23, 42, 0.55);
                --bg-panel: rgba(30, 41, 59, 0.85);
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --brand-primary: #0a84ff;
            }
        }

        body[data-theme="light"] {
            --bg-base: #f8fafc;
            --bg-canvas: #e2e8f0;
            --bg-glass: rgba(255, 255, 255, 0.65);
            --bg-panel: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --brand-primary: #007aff;
        }
        
        body[data-theme="dark"] {
            --bg-base: #020617;
            --bg-canvas: #0f172a;
            --bg-glass: rgba(15, 23, 42, 0.55);
            --bg-panel: rgba(30, 41, 59, 0.85);
            --text-main: #f8fafc;
            --brand-primary: #0a84ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg-canvas);
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            user-select: none;
            touch-action: none;
        }

        #app-container {
            position: absolute;
            inset: 0;
            background: var(--bg-canvas);
        }
        
        .grid-pattern {
            background-image: radial-gradient(var(--border-strong) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        
        canvas.engine-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #layer-base { z-index: 1; pointer-events: auto; }
        #layer-live { z-index: 2; }
        #layer-laser { z-index: 3; }

        /* Auth Gateway */
        #auth-gateway {
            position: fixed;
            inset: 0;
            z-index: var(--z-modal);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(40px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-float);
            border: 1px solid var(--border-subtle);
            animation: slideUp 0.5s var(--ease-spring);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .brand-header { text-align: center; margin-bottom: 32px; }
        .brand-title { font-size: 36px; font-weight: 800; letter-spacing: -1px; }
        .brand-title span { color: var(--brand-primary); }
        
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-base);
            border: 1.5px solid var(--border-strong);
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            transition: all var(--duration-fast);
        }
        .form-input:focus {
            border-color: var(--brand-primary);
            outline: none;
            box-shadow: 0 0 0 4px var(--brand-alpha);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all var(--duration-fast);
            cursor: pointer;
        }
        .btn-primary {
            background: var(--brand-primary);
            color: white;
            border: none;
        }
        .btn-primary:active { transform: scale(0.96); }
        .btn-ghost {
            background: var(--bg-base);
            border: 1.5px solid var(--border-strong);
            color: var(--text-main);
        }
        
        .auth-divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 12px;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--text-muted);
        }
        .auth-divider span { padding: 0 16px; }

        /* UI Overlay */
        #ui-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: var(--z-ui);
            display: none;
        }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            pointer-events: none;
            z-index: 101;
            flex-wrap: wrap;
        }

        .status-pill {
            background: var(--bg-glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border-subtle);
            border-radius: 99px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
            box-shadow: var(--shadow-float);
        }

        /* Bottom Dock */
        .bottom-dock {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 101;
        }

        .dock-content {
            background: var(--bg-glass);
            backdrop-filter: blur(50px);
            border: 1px solid var(--border-subtle);
            border-radius: 28px;
            padding: 8px;
            display: flex;
            gap: 4px;
            pointer-events: auto;
            box-shadow: var(--shadow-float);
            overflow-x: auto;
            max-width: 95%;
            scrollbar-width: none;
        }
        .dock-content::-webkit-scrollbar { display: none; }

        .action-btn {
            min-width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all var(--duration-fast);
            cursor: pointer;
            background: transparent;
            flex-shrink: 0;
        }
        .action-btn:active { transform: scale(0.92); }
        .action-btn.is-active {
            background: var(--brand-primary);
            color: white;
        }
        
        .color-indicator {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--bg-panel);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .dock-sep {
            width: 1px;
            height: 36px;
            background: var(--border-strong);
            margin: 0 4px;
        }

        /* Minimap */
        .minimap-widget {
            position: absolute;
            bottom: 90px;
            right: 16px;
            width: 160px;
            height: 110px;
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            z-index: var(--z-minimap);
            transition: all var(--duration-base);
        }
        .minimap-widget.is-hidden {
            transform: scale(0.8);
            opacity: 0;
            pointer-events: none;
        }
        .minimap-body {
            position: relative;
            width: 100%;
            height: calc(100% - 32px);
        }
        .minimap-header {
            height: 32px;
            background: rgba(0,0,0,0.03);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: grab;
        }
        .minimap-header:active { cursor: grabbing; }
        .minimap-close-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        #minimap-cvs {
            width: 100%;
            height: 100%;
        }
        #minimap-view {
            position: absolute;
            border: 2px solid var(--brand-primary);
            background: var(--brand-alpha);
            border-radius: 4px;
            pointer-events: none;
        }

        /* Drawers */
        .backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: var(--z-overlay);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .backdrop.is-visible {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            border-radius: 28px 28px 0 0;
            transform: translateY(100%);
            transition: transform 0.4s var(--ease-spring);
            z-index: calc(var(--z-overlay) + 1);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
        }
        .drawer.is-open {
            transform: translateY(0);
        }
        .drawer.right {
            border-radius: 28px 28px 0 0;
        }
        .drawer-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-strong);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: 800;
        }
        .drawer-content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        .btn-close {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Settings */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        .setting-card {
            background: var(--bg-base);
            border: 1px solid var(--border-strong);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--duration-fast);
            text-align: center;
        }
        .setting-card:active { transform: scale(0.96); }
        .setting-card.danger { color: var(--state-danger); }
        
        .slider-group {
            background: var(--bg-base);
            padding: 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: var(--border-strong);
            border-radius: 3px;
        }
        input[type="range"]::-webkit-slider-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--brand-primary);
            cursor: pointer;
            -webkit-appearance: none;
        }
        
        .link-box {
            background: var(--bg-base);
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            word-break: break-all;
            font-size: 11px;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .copy-btn {
            padding: 6px 12px;
            background: var(--brand-primary);
            color: white;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            cursor: pointer;
        }

        /* Color Wheel */
        .color-wheel-wrapper {
            width: 100%;
            max-width: 260px;
            margin: 0 auto 20px;
            aspect-ratio: 1;
        }
        #cvs-color-picker {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            cursor: crosshair;
        }
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .swatch-box {
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid var(--border-subtle);
            transition: transform var(--duration-fast);
        }
        .swatch-box:active { transform: scale(0.92); }

        /* Chat */
        .chat-messages {
            height: 50vh;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .msg-bubble.mine {
            background: var(--brand-primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }
        .msg-bubble.other {
            background: var(--bg-base);
            border: 1px solid var(--border-strong);
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }
        .msg-info {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .msg-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
        }
        .chat-composer {
            padding: 16px;
            border-top: 1px solid var(--border-strong);
            display: flex;
            gap: 12px;
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 99px;
            border: 1px solid var(--border-strong);
            background: var(--bg-base);
            font-size: 15px;
        }
        .chat-submit {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--brand-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Users */
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 55vh;
            overflow-y: auto;
        }
        .user-card {
            background: var(--bg-base);
            border: 1px solid var(--border-strong);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 14px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--brand-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 16px;
        }
        .perm-actions {
            display: flex;
            gap: 8px;
        }
        .perm-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--bg-panel);
            border: 1px solid var(--border-strong);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .perm-btn.is-granted {
            background: var(--brand-alpha);
            color: var(--brand-primary);
            border-color: var(--brand-primary);
        }

        /* Audio Viz */
        .audio-module {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-base);
            padding: 0 12px;
            height: 48px;
            border-radius: 16px;
        }
        .viz-container {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 24px;
        }
        .viz-bar {
            width: 3px;
            background: var(--brand-primary);
            border-radius: 2px;
            transition: height 0.05s;
        }
        .mic-on { color: var(--state-success) !important; background: rgba(52, 199, 89, 0.15) !important; }
        .mic-off { color: var(--state-danger) !important; background: rgba(255, 59, 48, 0.1) !important; }
        
        .badge-counter {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--state-danger);
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg-panel);
        }

        /* Modal */
        .modal-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
            z-index: var(--z-modal);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s var(--ease-spring);
        }
        .modal-box.is-visible {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        .modal-box textarea {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border-strong);
            background: var(--bg-base);
            font-size: 15px;
            margin: 16px 0;
            resize: none;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
        }

        /* Toast */
        .toast-wrapper {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast-item {
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            padding: 12px 20px;
            border-radius: 99px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: var(--shadow-float);
            animation: toastIn 0.3s var(--ease-spring);
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .toast-item.error { border-left: 4px solid var(--state-danger); }
        .toast-item.success { border-left: 4px solid var(--state-success); }

        /* Zen Mode */
        body.zen-mode .top-bar,
        body.zen-mode .bottom-dock,
        body.zen-mode .minimap-widget {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }
        .zen-exit-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border-subtle);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
        }
        body.zen-mode .zen-exit-btn { display: flex; }

        /* Mobile */
        @media (max-width: 768px) {
            .action-btn { min-width: 44px; height: 44px; }
            .status-pill { padding: 6px 12px; font-size: 11px; }
            .dock-content { padding: 6px; gap: 2px; }
            .minimap-widget { width: 130px; height: 90px; bottom: 80px; right: 12px; }
            .drawer { max-height: 85vh; }
            .chat-messages { height: 45vh; }
            .user-list { max-height: 50vh; }
            .top-bar { top: 12px; left: 12px; right: 12px; }
        }
    </style>
</head>
<body>

    <div id="toast-wrapper" class="toast-wrapper"></div>
    <button class="zen-exit-btn" id="btn-exit-zen"><i data-lucide="maximize-2"></i></button>

    <div id="auth-gateway">
        <div class="auth-panel">
            <div class="brand-header">
                <h1 class="brand-title">MR <span>BOARD</span></h1>
                <p style="font-size: 12px; color: var(--text-muted); margin-top: 8px;">Enterprise Edition</p>
            </div>
            <div class="form-group">
                <label class="form-label">Ismingiz</label>
                <input type="text" id="auth-name-inp" class="form-input" placeholder="Ismni kiriting" maxlength="25">
            </div>
            <button class="btn btn-primary" id="btn-create-room">
                <i data-lucide="plus-circle"></i> Yangi Xona (O'qituvchi)
            </button>
            <div class="auth-divider"><span>yoki</span></div>
            <div class="form-group">
                <label class="form-label">Xona Kodi</label>

    <script>
        (function() {
            lucide.createIcons();
            
            // ==================== UTILS ====================
            const Utils = {
                generateId: () => `${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                sanitize: (str) => String(str).replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])),
                throttle: (fn, delay) => { let last = 0; return (...args) => { const now = Date.now(); if (now - last >= delay) { fn(...args); last = now; } }; },
                vibrate: (p) => navigator.vibrate && navigator.vibrate(p),
                getTime: () => new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                generateTeacherCode: () => {
                    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789abcdefghijklmnopqrstuvwxyz';
                    let r = '';
                    for (let i = 0; i < 16; i++) r += chars[Math.floor(Math.random() * chars.length)];
                    return r;
                },
                generateStudentCode: () => {
                    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
                    let r = '';
                    for (let i = 0; i < 6; i++) r += chars[Math.floor(Math.random() * chars.length)];
                    return r;
                },
                copyToClipboard: (text) => {
                    navigator.clipboard.writeText(text).then(() => {
                        showToast("Link nusxalandi!", "success");
                    }).catch(() => showToast("Nusxalashda xatolik", "error"));
                }
            };
            
            function showToast(msg, type = "info") {
                const container = document.getElementById('toast-wrapper');
                const toast = document.createElement('div');
                toast.className = `toast-item ${type}`;
                toast.innerHTML = `<span>${msg}</span>`;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
            
            // ==================== STORE ====================
            const Store = {
                uid: Utils.generateId(),
                name: '',
                isTeacher: false,
                roomId: '',
                teacherSecret: '',
                perms: { draw: false, speak: false },
                micActive: false,
                tool: 'draw',
                color: '#007aff',
                size: 4,
                cam: { x: 0, y: 0, z: 1 },
                elements: [],
                livePaths: {},
                laserPaths: {},
                cursors: {},
                users: {},
                unread: 0,
                textPos: null,
                laserEnabled: true,
                minimapVisible: true
            };
            
            // ==================== EVENTS ====================
            const Events = new (class {
                constructor() { this.l = {}; }
                on(e, fn) { if (!this.l[e]) this.l[e] = []; this.l[e].push(fn); }
                emit(e, d) { if (this.l[e]) this.l[e].forEach(fn => fn(d)); }
            })();
            
            // ==================== FIREBASE ====================
            let dbRef = null;
            const DB = {
                init(roomId, teacherSecret) {
                    if (!firebase.apps.length) {
                        firebase.initializeApp({
                            apiKey: "AIzaSyDvbG7fChb2LN_nJhwTF1iMKMXNPcuGk5Y",
                            databaseURL: "https://tictactoe-26434-default-rtdb.firebaseio.com",
                            projectId: "tictactoe-26434"
                        });
                    }
                    dbRef = firebase.database().ref(`mrboard_final/${roomId}`);
                    
                    const me = dbRef.child(`users/${Store.uid}`);
                    me.onDisconnect().remove();
                    me.set({ id: Store.uid, n: Store.name, t: Store.isTeacher, d: Store.perms.draw, s: Store.perms.speak });
                    
                    if (Store.isTeacher && teacherSecret) {
                        dbRef.child('meta/teacherSecret').set(teacherSecret);
                        dbRef.child('meta/studentCode').set(roomId);
                        dbRef.child('meta/laserEnabled').set(true);
                    }
                    
                    this.attachListeners();
                },
                
                attachListeners() {
                    dbRef.child('elements').on('value', s => { Store.elements = s.val() ? Object.values(s.val()) : []; Events.emit('render'); });
                    dbRef.child('live').on('value', s => { Store.livePaths = s.val() || {}; Events.emit('render'); });
                    dbRef.child('laser').on('value', s => { Store.laserPaths = s.val() || {}; Events.emit('render'); });
                    dbRef.child('cursors').on('value', s => { Store.cursors = s.val() || {}; Events.emit('render'); });
                    dbRef.child('meta/laserEnabled').on('value', s => { Store.laserEnabled = s.val() !== false; Events.emit('render'); });
                    
                    if (!Store.isTeacher) {
                        dbRef.child('camera').on('value', s => {
                            if (s.val() && !Store.perms.draw) { Store.cam = s.val(); Events.emit('render'); Events.emit('zoom'); }
                        });
                    }
                    
                    dbRef.child('users').on('value', s => {
                        Store.users = s.val() || {};
                        if (!Store.isTeacher && Store.users[Store.uid]) {
                            const u = Store.users[Store.uid];
                            if (Store.perms.draw !== u.d) {
                                Store.perms.draw = u.d;
                                showToast(u.d ? "Chizish huquqi berildi" : "Chizish huquqi olindi", u.d ? "success" : "warning");
                            }
                            if (Store.perms.speak !== u.s) {
                                Store.perms.speak = u.s;
                                if (!u.s && Store.micActive) { Store.micActive = false; Events.emit('mic'); }
                                showToast(u.s ? "Mikrofon huquqi berildi" : "Mikrofon huquqi olindi", u.s ? "success" : "warning");
                            }
                            Events.emit('role');
                        }
                        Events.emit('users');
                    });
                    dbRef.child('chat').on('child_added', s => Events.emit('chat', s.val()));
                },
                
                addElement(el) { el.u = Store.uid; el.t = Date.now(); dbRef.child('elements').push(el); },
                
                addLive(id, data, isLaser) {
                    if (isLaser && !Store.laserEnabled && !Store.isTeacher) return;
                    dbRef.child(`${isLaser ? 'laser' : 'live'}/${id}`).set(data);
                    if (isLaser) setTimeout(() => dbRef.child(`laser/${id}`).remove(), 1000);
                },
                updateLive(id, points, isLaser) { dbRef.child(`${isLaser ? 'laser' : 'live'}/${id}`).update({ p: points }); },
                removeLive(id) { dbRef.child(`live/${id}`).remove(); },
                
                updateCursor: Utils.throttle((pos) => { dbRef.child(`cursors/${Store.uid}`).set({ x: pos.x, y: pos.y, n: Store.name, t: Store.isTeacher }); }, 50),
                syncCamera() { if (Store.isTeacher) dbRef.child('camera').set(Store.cam); },
                
                undo() {
                    dbRef.child('elements').once('value', snap => {
                        if (!snap.val()) return;
                        const els = Object.entries(snap.val()).map(([k, v]) => ({ k, ...v })).filter(e => Store.isTeacher || e.u === Store.uid);
                        if (els.length) {
                            const last = els.sort((a, b) => a.t - b.t)[els.length - 1];
                            dbRef.child(`elements/${last.k}`).remove();
                            showToast("Bekor qilindi", "success");
                        }
                    });
                },
                
                clearBoard() {
                    if (Store.isTeacher) {
                        dbRef.child('meta/teacherSecret').once('value', snap => {
                            if (snap.val() === Store.teacherSecret) {
                                dbRef.child('elements').remove();
                                showToast("Doska tozalandi", "success");
                            }
                        });
                    }
                },
                
                toggleLaser() {
                    if (Store.isTeacher) {
                        dbRef.child('meta/teacherSecret').once('value', snap => {
                            if (snap.val() === Store.teacherSecret) {
                                const newVal = !Store.laserEnabled;
                                dbRef.child('meta/laserEnabled').set(newVal);
                                showToast(newVal ? "Lazer yoqildi" : "Lazer o'chirildi", "info");
                            }
                        });
                    }
                },
                
                setPerm(userId, type, val) {
                    if (Store.isTeacher) dbRef.child(`users/${userId}`).update({ [type]: val });
                },
                
                kickUser(userId) {
                    if (Store.isTeacher) {
                        dbRef.child(`users/${userId}`).remove();
                        showToast("Foydalanuvchi chiqarildi", "success");
                    }
                },
                
                sendChat(msg) { dbRef.child('chat').push({ u: Store.uid, n: Store.name, t: Store.isTeacher, m: msg, tm: Utils.getTime() }); }
            };
            
            // ==================== GRAPHICS ENGINE (simplified core) ====================
            class GraphicsEngine {
                constructor() {
                    this.cvs = {
                        b: document.getElementById('layer-base'),
                        l: document.getElementById('layer-live'),
                        s: document.getElementById('layer-laser')
                    };
                    this.ctx = {
                        b: this.cvs.b.getContext('2d'),
                        l: this.cvs.l.getContext('2d'),
                        s: this.cvs.s.getContext('2d')
                    };
                    this.miniCvs = document.getElementById('minimap-cvs');
                    this.miniCtx = this.miniCvs.getContext('2d');
                    this.miniView = document.getElementById('minimap-view');
                    this.isDrawing = false;
                    this.lastPos = null;
                    this.activeId = null;
                    this.shapeStart = null;
                    this.dirty = true;
                }
                
                init() {
                    window.addEventListener('resize', () => this.resize());
                    this.resize();
                    Events.on('render', () => this.dirty = true);
                    requestAnimationFrame(() => this.loop());
                }
                
                resize() {
                    const w = window.innerWidth, h = window.innerHeight;
                    Object.keys(this.cvs).forEach(k => {
                        this.cvs[k].width = w;
                        this.cvs[k].height = h;
                    });
                    this.dirty = true;
                }
                
                toWorld(x, y) { return { x: (x - Store.cam.x) / Store.cam.z, y: (y - Store.cam.y) / Store.cam.z }; }
                toScreen(x, y) { return { x: x * Store.cam.z + Store.cam.x, y: y * Store.cam.z + Store.cam.y }; }
                
                bindEvents() {
                    const wrap = document.getElementById('app-container');
                    
                    wrap.addEventListener('wheel', e => {
                        e.preventDefault();
                        if (e.ctrlKey || e.metaKey) {
                            const p = this.toWorld(e.clientX, e.clientY);
                            const nz = Math.min(5, Math.max(0.2, Store.cam.z * (e.deltaY > 0 ? 0.9 : 1.1)));
                            Store.cam.z = nz;
                            Store.cam.x = e.clientX - p.x * nz;
                            Store.cam.y = e.clientY - p.y * nz;
                            Events.emit('zoom');
                        } else {
                            Store.cam.x -= e.deltaX;
                            Store.cam.y -= e.deltaY;
                        }
                        this.dirty = true;
                        DB.syncCamera();
                    }, { passive: false });
                    
                    wrap.addEventListener('pointerdown', e => {
                        if (e.target.closest('.drawer') || e.target.closest('.bottom-dock') || e.target.closest('.minimap-widget')) return;
                        e.preventDefault();
                        const p = this.toWorld(e.clientX, e.clientY);
                        
                        if (Store.tool === 'text') {
                            if (Store.perms.draw) {
                                Store.textPos = p;
                                document.getElementById('modal-text-input').classList.add('is-visible');
                                document.getElementById('drawer-backdrop').classList.add('is-visible');
                            }
                            return;
                        }
                        
                        if (!Store.perms.draw && Store.tool !== 'pan' && Store.tool !== 'laser') return;
                        
                        this.isDrawing = true;
                        this.lastPos = { x: e.clientX, y: e.clientY };
                        this.activeId = Utils.generateId();
                        const isLaser = Store.tool === 'laser' && Store.laserEnabled;
                        
                        if (['draw', 'erase', 'laser'].includes(Store.tool)) {
                            DB.addLive(this.activeId, {
                                p: [p],
                                c: Store.tool === 'erase' ? '#ffffff' : (isLaser ? '#ff3b30' : Store.color),
                                s: (Store.tool === 'erase' ? 40 : Store.size) / Store.cam.z,
                                tl: Store.tool
                            }, isLaser);
                        } else if (['rect', 'circle', 'line', 'arrow'].includes(Store.tool)) {
                            this.shapeStart = p;
                            DB.addLive(this.activeId, {
                                tl: Store.tool,
                                p1: p,
                                p2: p,
                                c: Store.color,
                                s: Store.size / Store.cam.z
                            });
                        }
                    });
                    
                    window.addEventListener('pointermove', e => {
                        if (!this.isDrawing) {
                            DB.updateCursor(this.toWorld(e.clientX, e.clientY));
                            return;
                        }
                        
                        if (Store.tool === 'pan') {
                            Store.cam.x += e.clientX - this.lastPos.x;
                            Store.cam.y += e.clientY - this.lastPos.y;
                            this.lastPos = { x: e.clientX, y: e.clientY };
                            this.dirty = true;
                            return;
                        }
                        
                        const p = this.toWorld(e.clientX, e.clientY);
                        const isLaser = Store.tool === 'laser' && Store.laserEnabled;
                        const active = isLaser ? Store.laserPaths[this.activeId] : Store.livePaths[this.activeId];
                        
                        if (['draw', 'erase', 'laser'].includes(Store.tool) && active && active.p) {
                            const last = active.p[active.p.length - 1];
                            if (Math.hypot(p.x - last.x, p.y - last.y) > 3 / Store.cam.z) {
                                active.p.push(p);
                                DB.updateLive(this.activeId, active.p, isLaser);
                            }
                        } else if (['rect', 'circle', 'line', 'arrow'].includes(Store.tool) && this.shapeStart) {
                            DB.updateLive(this.activeId, null);
                            DB.addLive(this.activeId, {
                                tl: Store.tool,
                                p1: this.shapeStart,
                                p2: p,
                                c: Store.color,
                                s: Store.size / Store.cam.z
                            });
                        }
                        this.lastPos = { x: e.clientX, y: e.clientY };
                    });
                    
                    window.addEventListener('pointerup', () => {
                        if (!this.isDrawing) return;
                        this.isDrawing = false;
                        
                        if (['draw', 'erase'].includes(Store.tool) && Store.livePaths[this.activeId]) {
                            const path = Store.livePaths[this.activeId];
                            if (path && path.p && path.p.length > 1) {
                                DB.addElement({ type: 'path', p: path.p, c: path.c, s: path.s });
                            }
                            DB.removeLive(this.activeId);
                        } else if (['rect', 'circle', 'line', 'arrow'].includes(Store.tool) && Store.livePaths[this.activeId]) {
                            const shape = Store.livePaths[this.activeId];
                            if (shape && shape.p1 && shape.p2 && Math.hypot(shape.p1.x - shape.p2.x, shape.p1.y - shape.p2.y) > 5) {
                                DB.addElement({ type: 'shape', tl: shape.tl, p1: shape.p1, p2: shape.p2, c: shape.c, s: shape.s });
                            }
                            DB.removeLive(this.activeId);
                            this.shapeStart = null;
                        } else if (Store.tool === 'laser') {
                            DB.removeLive(this.activeId);
                        }
                        this.activeId = null;
                    });
                    
                    let pinchDist = null;
                    wrap.addEventListener('touchstart', e => {
                        if (e.touches.length === 2) {
                            e.preventDefault();
                            pinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                        }
                    });
                    wrap.addEventListener('touchmove', e => {
                        if (e.touches.length === 2 && pinchDist) {
                            e.preventDefault();
                            const newDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                            const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                            const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                            const p = this.toWorld(cx, cy);
                            const nz = Math.min(5, Math.max(0.2, Store.cam.z * (newDist / pinchDist)));
                            Store.cam.z = nz;
                            Store.cam.x = cx - p.x * nz;
                            Store.cam.y = cy - p.y * nz;
                            this.dirty = true;
                            Events.emit('zoom');
                            DB.syncCamera();
                        }
                    });
                    wrap.addEventListener('touchend', () => { pinchDist = null; });
                }
                
                drawPath(ctx, points, color, width, glow) {
                    if (!points || points.length < 2) return;
                    ctx.beginPath();
                    ctx.strokeStyle = color;
                    ctx.lineWidth = width;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    if (glow) { ctx.shadowBlur = 15; ctx.shadowColor = color; }
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length - 1; i++) {
                        const xc = (points[i].x + points[i + 1].x) / 2;
                        const yc = (points[i].y + points[i + 1].y) / 2;
                        ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
                    }
                    ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
                    ctx.stroke();
                    if (glow) ctx.shadowBlur = 0;
                }
                
                drawShape(ctx, e) {
                    ctx.beginPath();
                    ctx.strokeStyle = e.c;
                    ctx.lineWidth = e.s;
                    const { p1, p2, tl } = e;
                    if (tl === 'rect') ctx.rect(p1.x, p1.y, p2.x - p1.x, p2.y - p1.y);
                    else if (tl === 'circle') ctx.arc(p1.x, p1.y, Math.hypot(p2.x - p1.x, p2.y - p1.y), 0, Math.PI * 2);
                    else if (tl === 'line') { ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); }
                    else if (tl === 'arrow') {
                        const ang = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                        const sz = 20 / Store.cam.z;
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.lineTo(p2.x - sz * Math.cos(ang - Math.PI / 6), p2.y - sz * Math.sin(ang - Math.PI / 6));
                        ctx.moveTo(p2.x, p2.y);
                        ctx.lineTo(p2.x - sz * Math.cos(ang + Math.PI / 6), p2.y - sz * Math.sin(ang + Math.PI / 6));
                    }
                    ctx.stroke();
                }
                
                loop() {
                    if (this.dirty) {
                        const w = window.innerWidth, h = window.innerHeight;
                        const { b, l, s } = this.ctx;
                        b.clearRect(0, 0, w, h);
                        l.clearRect(0, 0, w, h);
                        s.clearRect(0, 0, w, h);
                        
                        const mmW = this.miniCvs.parentElement.clientWidth;
                        const mmH = this.miniCvs.parentElement.clientHeight;
                        this.miniCvs.width = mmW;
                        this.miniCvs.height = mmH;
                        this.miniCtx.clearRect(0, 0, mmW, mmH);
                        
                        let bounds = { xMin: Infinity, yMin: Infinity, xMax: -Infinity, yMax: -Infinity };
                        
                        b.save();
                        b.translate(Store.cam.x, Store.cam.y);
                        b.scale(Store.cam.z, Store.cam.z);
                        Store.elements.forEach(el => {
                            if (el.type === 'path') this.drawPath(b, el.p, el.c, el.s);
                            else if (el.type === 'shape') this.drawShape(b, el);
                            else if (el.type === 'text') {
                                b.font = `800 ${Math.min(el.s, 48)}px -apple-system`;
                                b.fillStyle = el.c;
                                b.fillText(el.text, el.x, el.y);
                            } else if (el.type === 'image' && el.data) {
                                if (!el.img) { el.img = new Image(); el.img.src = el.data; el.img.onload = () => this.dirty = true; }
                                if (el.img.complete) b.drawImage(el.img, el.x, el.y, el.width, el.height);
                            }
                            if (el.x !== undefined) {
                                bounds.xMin = Math.min(bounds.xMin, el.x);
                                bounds.xMax = Math.max(bounds.xMax, el.x + (el.width || 100));
                                bounds.yMin = Math.min(bounds.yMin, el.y);
                                bounds.yMax = Math.max(bounds.yMax, el.y + (el.height || 100));
                            } else if (el.p && el.p[0]) {
                                el.p.forEach(p => {
                                    bounds.xMin = Math.min(bounds.xMin, p.x);
                                    bounds.xMax = Math.max(bounds.xMax, p.x);
                                    bounds.yMin = Math.min(bounds.yMin, p.y);
                                    bounds.yMax = Math.max(bounds.yMax, p.y);
                                });
                            } else if (el.p1 && el.p2) {
                                bounds.xMin = Math.min(bounds.xMin, el.p1.x, el.p2.x);
                                bounds.xMax = Math.max(bounds.xMax, el.p1.x, el.p2.x);
                                bounds.yMin = Math.min(bounds.yMin, el.p1.y, el.p2.y);
                                bounds.yMax = Math.max(bounds.yMax, el.p1.y, el.p2.y);
                            }
                        });
                        b.restore();
                        
                        l.save();
                        l.translate(Store.cam.x, Store.cam.y);
                        l.scale(Store.cam.z, Store.cam.z);
                        Object.values(Store.livePaths).forEach(e => {
                            if (e && e.p) this.drawPath(l, e.p, e.c, e.s);
                            else if (e && e.p1) this.drawShape(l, e);
                        });
                        l.restore();
                        
                        if (Store.laserEnabled) {
                            s.save();
                            s.translate(Store.cam.x, Store.cam.y);
                            s.scale(Store.cam.z, Store.cam.z);
                            Object.values(Store.laserPaths).forEach(e => {
                                if (e && e.p) this.drawPath(s, e.p, e.c, e.s, true);
                            });
                            s.restore();
                        }
                        
                        l.save();
                        Object.values(Store.cursors).forEach(c => {
                            if (c.n === Store.name || typeof c.x !== 'number') return;
                            const pos = this.toScreen(c.x, c.y);
                            l.beginPath();
                            l.arc(pos.x, pos.y, 6, 0, Math.PI * 2);
                            l.fillStyle = c.t ? '#ffcc00' : '#ff3b30';
                            l.fill();
                            l.fillStyle = '#fff';
                            l.font = 'bold 10px -apple-system';
                            l.fillText(c.n, pos.x + 10, pos.y + 3);
                        });
                        l.restore();
                        
                        if (Store.minimapVisible && bounds.xMin !== Infinity) {
                            const pad = Math.max(50, (bounds.xMax - bounds.xMin) * 0.1);
                            bounds.xMin -= pad;
                            bounds.xMax += pad;
                            bounds.yMin -= pad;
                            bounds.yMax += pad;
                            const scale = Math.min(mmW / (bounds.xMax - bounds.xMin), mmH / (bounds.yMax - bounds.yMin));
                            const offX = mmW / 2 - (bounds.xMin + (bounds.xMax - bounds.xMin) / 2) * scale;
                            const offY = mmH / 2 - (bounds.yMin + (bounds.yMax - bounds.yMin) / 2) * scale;
                            
                            this.miniCtx.save();
                            this.miniCtx.translate(offX, offY);
                            this.miniCtx.scale(scale, scale);
                            Store.elements.forEach(el => {
                                if (el.type === 'path') this.drawPath(this.miniCtx, el.p, el.c, Math.max(1, el.s * scale));
                                else if (el.type === 'shape') this.drawShape(this.miniCtx, el);
                            });
                            this.miniCtx.restore();
                            
                            const viewX = (-Store.cam.x / Store.cam.z) * scale + offX;
                            const viewY = (-Store.cam.y / Store.cam.z) * scale + offY;
                            const viewW = (w / Store.cam.z) * scale;
                            const viewH = (h / Store.cam.z) * scale;
                            this.miniView.style.width = `${Math.max(20, viewW)}px`;
                            this.miniView.style.height = `${Math.max(15, viewH)}px`;
                            this.miniView.style.transform = `translate(${Math.max(0, Math.min(viewX, mmW - viewW))}px, ${Math.max(0, Math.min(viewY, mmH - viewH))}px)`;
                        }
                        this.dirty = false;
                    }
                    requestAnimationFrame(() => this.loop());
                }
            }
            
            const Engine = new GraphicsEngine();
            
            // ==================== AUDIO ====================
            let audioStream = null;
            const AudioSystem = {
                async init() {
                    try {
                        audioStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
                        if (Store.perms.speak) Store.micActive = true;
                        this.sync();
                        this.visualizer();
                        Events.emit('mic');
                    } catch (e) { showToast("Mikrofon topilmadi", "warning"); }
                },
                visualizer() {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const analyser = ctx.createAnalyser();
                    ctx.createMediaStreamSource(audioStream).connect(analyser);
                    analyser.fftSize = 128;
                    const data = new Uint8Array(analyser.frequencyBinCount);
                    const draw = () => {
                        requestAnimationFrame(draw);
                        const bars = document.querySelectorAll('.viz-bar');
                        if (!(Store.perms.speak && Store.micActive)) {
                            bars.forEach(b => b.style.height = '4px');
                            return;
                        }
                        analyser.getByteFrequencyData(data);
                        let sum = 0;
                        for (let i = 0; i < data.length; i++) sum += data[i];
                        const avg = sum / data.length;
                        const h = Math.min(20, 4 + (avg / 128) * 16);
                        bars.forEach((b, i) => {
                            b.style.height = `${Math.max(4, h * Math.sin((i / 6) * Math.PI))}px`;
                        });
                    };
                    draw();
                },
                sync() { if (audioStream) audioStream.getAudioTracks()[0].enabled = Store.perms.speak && Store.micActive; },
                async toggle() {
                    if (!Store.perms.speak) { showToast("Mikrofon ruxsati yo'q", "error"); return; }
                    if (!audioStream) await this.init();
                    Store.micActive = !Store.micActive;
                    this.sync();
                    Events.emit('mic');
                    Utils.vibrate(10);
                }
            };
            
            // ==================== UI CONTROLLER ====================
            class UIController {
                constructor() {
                    this.initEvents();
                    this.initColorWheel();
                    this.initTheme();
                }
                
                initTheme() {
                    const saved = localStorage.getItem('mr_theme');
                    if (saved) document.body.setAttribute('data-theme', saved);
                    else {
                        const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                        document.body.setAttribute('data-theme', dark ? 'dark' : 'light');
                    }
                }
                
                setTheme(mode) {
                    if (mode === 'auto') {
                        localStorage.removeItem('mr_theme');
                        const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                        document.body.setAttribute('data-theme', dark ? 'dark' : 'light');
                    } else {
                        localStorage.setItem('mr_theme', mode);
                        document.body.setAttribute('data-theme', mode);
                    }
                }
                
                initEvents() {
                    document.getElementById('btn-create-room').onclick = () => this.createRoom();
                    document.getElementById('btn-join-room').onclick = () => this.joinRoom();
                    document.getElementById('btn-action-exit').onclick = () => { if (confirm("Chiqish?")) location.reload(); };
                    document.getElementById('btn-action-undo').onclick = () => DB.undo();
                    document.getElementById('btn-action-mic').onclick = () => AudioSystem.toggle();
                    document.getElementById('btn-action-fullscreen').onclick = () => this.toggleFullscreen();
                    document.getElementById('btn-exit-zen').onclick = () => this.toggleFullscreen();
                    document.getElementById('btn-open-settings').onclick = () => this.openDrawer('drawer-settings');
                    document.getElementById('btn-open-colors').onclick = () => this.openDrawer('drawer-colors');
                    document.getElementById('btn-open-chat').onclick = () => this.openDrawer('drawer-chat');
                    document.getElementById('btn-open-users').onclick = () => this.openDrawer('drawer-users');
                    document.getElementById('btn-toggle-shapes').onclick = () => this.openDrawer('drawer-shapes');
                    document.getElementById('btn-submit-chat').onclick = () => this.sendChat();
                    document.getElementById('inp-chat-text').onkeypress = e => { if (e.key === 'Enter') this.sendChat(); };
                    document.getElementById('btn-cancel-text').onclick = () => this.closeTextModal();
                    document.getElementById('btn-add-text').onclick = () => this.addText();
                    document.getElementById('act-clear-board').onclick = () => { if (confirm("Doska tozalanadi?")) DB.clearBoard(); this.closeDrawers(); };
                    document.getElementById('act-disable-laser').onclick = () => { DB.toggleLaser(); this.closeDrawers(); };
                    document.getElementById('act-toggle-minimap').onclick = () => this.toggleMinimap();
                    document.getElementById('act-center').onclick = () => { Store.cam = { x: 0, y: 0, z: 1 }; Events.emit('render'); Events.emit('zoom'); DB.syncCamera(); this.closeDrawers(); };
                    document.getElementById('act-undo').onclick = () => { DB.undo(); this.closeDrawers(); };
                    document.getElementById('act-export').onclick = () => { const a = document.createElement('a'); a.download = `mrboard_${Date.now()}.png`; a.href = document.getElementById('layer-base').toDataURL(); a.click(); this.closeDrawers(); };
                    document.getElementById('act-save-json').onclick = () => { const a = document.createElement('a'); a.download = `project.json`; a.href = "data:text/json," + encodeURIComponent(JSON.stringify(Store.elements)); a.click(); this.closeDrawers(); };
                    document.getElementById('act-load-json').onclick = () => { if (!Store.isTeacher) { showToast("Faqat o'qituvchi yuklay oladi", "error"); return; } document.getElementById('sys-file-json').click(); this.closeDrawers(); };
                    document.getElementById('act-image').onclick = () => document.getElementById('sys-file-img').click();
                    document.getElementById('act-theme-light').onclick = () => { this.setTheme('light'); this.closeDrawers(); };
                    document.getElementById('act-theme-dark').onclick = () => { this.setTheme('dark'); this.closeDrawers(); };
                    document.getElementById('act-theme-auto').onclick = () => { this.setTheme('auto'); this.closeDrawers(); };
                    document.getElementById('inp-tool-size').oninput = e => { Store.size = parseInt(e.target.value); document.getElementById('val-tool-size').innerText = Store.size + 'px'; };
                    
                    document.querySelectorAll('[data-tool]').forEach(btn => {
                        btn.onclick = () => { this.setTool(btn.dataset.tool); this.closeDrawers(); };
                    });
                    
                    document.querySelectorAll('[data-close]').forEach(btn => btn.onclick = () => this.closeDrawers());
                    document.getElementById('drawer-backdrop').onclick = () => this.closeDrawers();
                    
                    document.getElementById('sys-file-img').onchange = async e => {
                        const f = e.target.files[0];
                        if (!f || f.size > 5e6) { showToast("Rasm 5MB dan kichik", "error"); return; }
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const img = new Image();
                            img.onload = () => {
                                const center = Engine.toWorld(window.innerWidth / 2, window.innerHeight / 2);
                                let w = img.width, h = img.height;
                                const maxDim = 500 / Store.cam.z;
                                if (w > maxDim) { h = (maxDim / w) * h; w = maxDim; }
                                DB.addElement({ type: 'image', data: ev.target.result, x: center.x - w / 2, y: center.y - h / 2, width: w, height: h });
                            };
                            img.src = ev.target.result;
                        };
                        reader.readAsDataURL(f);
                        document.getElementById('sys-file-img').value = '';
                    };
                    
                    document.getElementById('sys-file-json').onchange = async e => {
                        const f = e.target.files[0];
                        if (!f) return;
                        const text = await f.text();
                        try {
                            const data = JSON.parse(text);
                            if (Array.isArray(data)) {
                                DB.clearBoard();
                                setTimeout(() => data.forEach(el => DB.addElement(el)), 500);
                                showToast("Loyiha yuklandi", "success");
                            }
                        } catch (err) { showToast("Fayl noto'g'ri", "error"); }
                        document.getElementById('sys-file-json').value = '';
                    };
                    
                    document.querySelectorAll('.copy-btn').forEach(btn => {
                        btn.onclick = () => {
                            const type = btn.dataset.copy;
                            const text = document.getElementById(`${type}-link-text`).innerText;
                            if (text) Utils.copyToClipboard(text);
                        };
                    });
                    
                    window.addEventListener('keydown', e => {
                        if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
                        const k = e.key.toLowerCase();
                        if (e.ctrlKey && k === 'z') { e.preventDefault(); DB.undo(); }
                        else if (k === 'b') this.setTool('draw');
                        else if (k === 'e') this.setTool('erase');
                        else if (k === 'h') this.setTool('pan');
                        else if (k === 't') this.setTool('text');
                        else if (k === 'l') this.setTool('laser');
                        else if (k === 's') this.openDrawer('drawer-shapes');
                        else if (k === 'm') AudioSystem.toggle();
                        else if (k === 'c') this.openDrawer('drawer-chat');
                        else if (k === 'u') this.openDrawer('drawer-users');
                        else if (k === 'f') this.toggleFullscreen();
                    });
                }
                
                toggleFullscreen() {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                        document.body.classList.add('zen-mode');
                    } else {
                        document.exitFullscreen();
                        document.body.classList.remove('zen-mode');
                    }
                }
                
                toggleMinimap() {
                    Store.minimapVisible = !Store.minimapVisible;
                    const mm = document.getElementById('minimap-widget');
                    if (Store.minimapVisible) mm.classList.remove('is-hidden');

                setTool(tool) {

                async joinRoom() {

                startApp(roomId, teacherSecret) {

                        if (!Store.isTeacher) {
                            if (Store.perms.draw) document.getElementById('ui-user-role').innerHTML = '<i data-lucide="pencil"></i> Yozuvchi';
                            else document.getElementById('ui-user-role').innerHTML = '<i data-lucide="eye"></i> Kuzatuvchi';
                            lucide.createIcons();
                        }
                    });
                    
                    Events.on('mic', () => {
                        const btn = document.getElementById('btn-action-mic');
                        btn.className = `action-btn ${!Store.perms.speak ? 'mic-off' : (Store.micActive ? 'mic-on' : 'mic-off')}`;
                        btn.innerHTML = `<i data-lucide="${Store.micActive && Store.perms.speak ? 'mic' : 'mic-off'}"></i>`;
                        lucide.createIcons();
                    });
                    
                    Events.on('chat', (msg) => {
                        const container = document.getElementById('ui-chat-messages');
                        const isMine = msg.u === Store.uid;
                        const bubble = document.createElement('div');
                        bubble.className = `msg-bubble ${isMine ? 'mine' : 'other'}`;
                        bubble.innerHTML = `
                            <div class="msg-info">
                                ${Utils.sanitize(msg.n)}
                                ${msg.t ? '<i data-lucide="crown" size="12" style="color:var(--state-warning)"></i>' : ''}
                            </div>
                            <div>${Utils.sanitize(msg.m)}</div>
                            <div class="msg-time">${msg.tm}</div>
                        `;
                        container.appendChild(bubble);
                        container.scrollTop = container.scrollHeight;
                        lucide.createIcons();
                        
                        if (!isMine && !document.getElementById('drawer-chat').classList.contains('is-open')) {
                            Store.unread++;
                            const badge = document.getElementById('badge-chat-count');
                            badge.innerText = Store.unread > 9 ? '9+' : Store.unread;
                            badge.style.display = 'flex';
                            Utils.vibrate([10, 30, 10]);
                        }
                    });
                    
                    Events.on('users', () => {
                        const list = document.getElementById('ui-participants-list');
                        let html = '', studentCount = 0;
                        Object.values(Store.users).forEach(p => {
                            if (p.t && p.id !== Store.uid) return;
                            if (!p.t) studentCount++;
                            html += `
                                <div class="user-card">
                                    <div class="user-meta">
                                        <div class="avatar">${p.n.charAt(0).toUpperCase()}</div>
                                        <span>${Utils.sanitize(p.n)}</span>
                                        ${p.t ? '<i data-lucide="crown" size="14" style="color:var(--state-warning)"></i>' : ''}
                                    </div>
                                    <div class="perm-actions">
                            `;
                            if (Store.isTeacher && !p.t) {
                                html += `
                                    <button class="perm-btn ${p.d ? 'is-granted' : ''}" data-user="${p.id}" data-perm="d"><i data-lucide="pencil" size="14"></i></button>
                                    <button class="perm-btn ${p.s ? 'is-granted' : ''}" data-user="${p.id}" data-perm="s"><i data-lucide="mic" size="14"></i></button>
                                    <button class="perm-btn" data-user="${p.id}" data-perm="kick"><i data-lucide="user-x" size="14"></i></button>
                                `;
                            } else if (!Store.isTeacher && p.t) {
                                html += `<span style="font-size:11px;">O'qituvchi</span>`;
                            } else if (!Store.isTeacher) {
                                html += `<span style="font-size:11px;">${p.d ? '✏️' : '👁️'} ${p.s ? '🎤' : '🔇'}</span>`;
                            }
                            html += `</div></div>`;
                        });
                        if (studentCount === 0 && !Store.isTeacher) html = '<div style="text-align:center; padding:20px;">Faqat o\'qituvchi</div>';
                        else if (studentCount === 0 && Store.isTeacher) html = '<div style="text-align:center; padding:20px;">Hali o\'quvchilar yo\'q</div>';
                        list.innerHTML = html;
                        lucide.createIcons();
                        document.getElementById('badge-users-count').innerText = studentCount;
                        document.getElementById('badge-users-count').style.display = studentCount > 0 ? 'flex' : 'none';
                        
                        if (Store.isTeacher) {
                            list.querySelectorAll('.perm-btn[data-perm="d"]').forEach(btn => {
                                btn.onclick = () => DB.setPerm(btn.dataset.user, 'd', !btn.classList.contains('is-granted'));
                            });
                            list.querySelectorAll('.perm-btn[data-perm="s"]').forEach(btn => {
                                btn.onclick = () => DB.setPerm(btn.dataset.user, 's', !btn.classList.contains('is-granted'));
                            });
                            list.querySelectorAll('.perm-btn[data-perm="kick"]').forEach(btn => {
                                btn.onclick = () => { if(confirm("Chiqarilsinmi?")) DB.kickUser(btn.dataset.user); };
                            });
                        }
                    });
                    
                    Events.emit('zoom');
                    lucide.createIcons();
                }
                
                initColorWheel() {
                    const cvs = document.getElementById('cvs-color-picker');
                    const ctx = cvs.getContext('2d');
                    let hue = 0.6, sat = 0.8, val = 1;
                    
                    const drawWheel = () => {
                        const w = cvs.width, r = w / 2;
                        for (let y = 0; y < w; y++) {
                            for (let x = 0; x < w; x++) {
                                const dx = x - r, dy = y - r, dist = Math.hypot(dx, dy);
                                if (dist <= r) {
                                    const h = (Math.atan2(dy, dx) + Math.PI) / (2 * Math.PI);
                                    const s = dist / r;
                                    const rgb = this.hsvToRgb(h, s, 1);
                                    ctx.fillStyle = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
                                    ctx.fillRect(x, y, 1, 1);
                                }
                            }
                        }
                    };
                    drawWheel();
                    
                    const updateColor = () => {
                        const rgb = this.hsvToRgb(hue, sat, val);
                        Store.color = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
                        document.getElementById('ui-current-color').style.background = Store.color;
                    };
                    
                    cvs.onclick = (e) => {
                        const rect = cvs.getBoundingClientRect();
                        const x = (e.clientX - rect.left) * (cvs.width / rect.width);
                        const y = (e.clientY - rect.top) * (cvs.height / rect.height);
                        const r = cvs.width / 2;
                        const dx = x - r, dy = y - r;
                        const dist = Math.hypot(dx, dy);
                        if (dist <= r) {
                            hue = (Math.atan2(dy, dx) + Math.PI) / (2 * Math.PI);
                            sat = dist / r;
                            updateColor();
                        }
                    };
                    
                    document.getElementById('inp-color-bright').oninput = e => {
                        val = e.target.value / 100;
                        updateColor();
                    };
                    
                    const palette = document.getElementById('ui-quick-palette');
                    ['#ffffff', '#000000', '#64748b', '#ff3b30', '#ff9500', '#ffcc00', '#34c759', '#30b0c7', '#007aff', '#5856d6', '#af52de', '#ff2d55'].forEach(col => {
                        const sw = document.createElement('div');
                        sw.className = 'swatch-box';
                        sw.style.background = col;
                        sw.onclick = () => { Store.color = col; document.getElementById('ui-current-color').style.background = col; this.setTool('draw'); Utils.vibrate(10); };
                        palette.appendChild(sw);
                    });
                }
                
                hsvToRgb(h, s, v) {
                    let r, g, b;
                    const i = Math.floor(h * 6);
                    const f = h * 6 - i;
                    const p = v * (1 - s);
                    const q = v * (1 - f * s);
                    const t = v * (1 - (1 - f) * s);
                    switch (i % 6) {
                        case 0: r = v; g = t; b = p; break;
                        case 1: r = q; g = v; b = p; break;
                        case 2: r = p; g = v; b = t; break;
                        case 3: r = p; g = q; b = v; break;
                        case 4: r = t; g = p; b = v; break;
                        default: r = v; g = p; b = q; break;
                    }
                    return { r: Math.round(r * 255), g: Math.round(g * 255), b: Math.round(b * 255) };
                }
            }
            
            const UI = new UIController();
            
            // Handle URL hash
            const hash = window.location.hash.slice(1);
            if (hash.startsWith('t-')) {
                const teacherSecret = hash.slice(2);
                const name = prompt("O'qituvchi ismingiz:") || "Teacher";
                if (name) {
                    Store.name = Utils.sanitize(name);
                    Store.isTeacher = true;
                    Store.teacherSecret = teacherSecret;
                    Store.roomId = teacherSecret.substring(0, 6);
                    Store.perms.draw = true;
                    Store.perms.speak = true;
                    UI.startApp(Store.roomId, teacherSecret);
                    
                    const baseUrl = window.location.href.split('#')[0];
                    setTimeout(() => {
                        document.getElementById('teacher-link-text').innerText = `${baseUrl}#t-${teacherSecret}`;
                        document.getElementById('student-link-text').innerText = `${baseUrl}#s-${Store.roomId}`;
                        document.getElementById('teacher-link-box').style.display = 'flex';
                        document.getElementById('student-link-box').style.display = 'flex';
                    }, 500);
                }
            } else if (hash.startsWith('s-')) {
                const studentCode = hash.slice(2);
                const name = prompt("Ismingiz:") || "Student";
                if (name) {
                    Store.name = Utils.sanitize(name);
                    Store.isTeacher = false;
                    Store.roomId = studentCode;
                    Store.perms.draw = false;
                    Store.perms.speak = false;
                    UI.startApp(studentCode, null);
                }
            }
        })();
    </script>
</body>
