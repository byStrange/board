                    document.getElementById('btn-create-room').onclick = () => this.handleAuth(true);
                    document.getElementById('btn-join-room').onclick = () => this.handleAuth(false);
                    document.querySelectorAll('[data-tool]').forEach(btn => { btn.onclick = () => { this.setTool(btn.dataset.tool); this.closeAll(); }; });
                    document.getElementById('btn-toggle-shapes').onclick = () => { Utils.vibrate(10); document.getElementById('toolbar-shapes').classList.toggle('is-visible'); };
                    document.getElementById('btn-action-undo').onclick = () => DB.undo();
                    document.getElementById('btn-action-mic').onclick = () => AudioSystem.toggle();
                    document.getElementById('btn-action-exit').onclick = () => { if (confirm("Xonadan chiqishni xohlaysizmi?")) location.reload(); };
                    
                    const drawers = { 'btn-open-settings': 'drawer-settings', 'btn-open-colors': 'drawer-colors', 'btn-open-users': 'drawer-users', 'btn-open-chat': 'drawer-chat' };
                    for (const [btnId, drawerId] of Object.entries(drawers)) { const btn = document.getElementById(btnId); if (btn) btn.onclick = () => this.openDrawer(drawerId); }
                    document.querySelectorAll('[data-close]').forEach(btn => btn.onclick = () => this.closeAll());
                    document.getElementById('drawer-backdrop').onclick = () => this.closeAll();

                    document.getElementById('btn-cancel-text').onclick = () => this.closeTextModal();
                    document.getElementById('btn-add-text').onclick = () => {
                        const txt = Utils.sanitize(document.getElementById('inp-text-area').value.trim()).substring(0, 300);
                        if (txt && Store.textCtx) DB.pushElement({ type: 'text', text: txt, x: Store.textCtx.x, y: Store.textCtx.y, s: Store.size * 4 + 16, c: Store.color });
                        this.closeTextModal();
                    };
                    
                    document.getElementById('inp-tool-size').oninput = e => { Store.size = parseInt(e.target.value); document.getElementById('val-tool-size').innerText = Store.size; };
                    document.getElementById('act-undo').onclick = () => { DB.undo(); this.closeAll(); };
                    document.getElementById('act-center').onclick = () => { Store.cam = { x: 0, y: 0, z: 1 }; AppEvents.emit('render'); AppEvents.emit('ui:zoom'); DB.syncCamera(); this.closeAll(); };
                    document.getElementById('act-clear-board').onclick = () => { if (confirm("Hamma narsa o'chiriladi. Ishonchingiz komilmi?")) DB.clearBoard(); this.closeAll(); };
                    
                    const fileImg = document.getElementById('sys-file-img'), fileJson = document.getElementById('sys-file-json');
                    document.getElementById('act-image').onclick = () => { fileImg.click(); this.closeAll(); };
                    fileImg.onchange = async e => {
                        const f = e.target.files[0]; if (!f || f.size > 5e6) return AppEvents.emit('ui:toast', { m: "Rasm o'lchami 5MB dan kichik bo'lishi kerak", t: 'error' });
                        try {
                            const data = await Utils.readFile(f); const img = new Image();
                            img.onload = () => {
                                const center = Engine.toWorld(window.innerWidth / 2, window.innerHeight / 2); let w = img.width, h = img.height;
                                const maxDim = 600 / Store.cam.z; if (w > maxDim) { h = (maxDim / w) * h; w = maxDim; }
                                DB.pushElement({ type: 'image', data: data, x: center.x - w / 2, y: center.y - h / 2, width: w, height: h });
                            }; img.src = data;
                        } catch (e) {} fileImg.value = '';
                    };
                    
                    document.getElementById('act-export').onclick = () => { const a = document.createElement('a'); a.download = `MR_BOARD_${Date.now()}.png`; a.href = document.getElementById('layer-base').toDataURL(); a.click(); this.closeAll(); };
                    document.getElementById('act-save-json').onclick = () => { const a = document.createElement('a'); a.download = `MR_Project.json`; a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(Store.db.els)); a.click(); this.closeAll(); };
                    document.getElementById('act-load-json').onclick = () => { if (!Store.isHost) return AppEvents.emit('ui:toast', { m: "Faqat xona egasi loyiha yuklay oladi", t: 'error' }); fileJson.click(); this.closeAll(); };
                    fileJson.onchange = async e => {
                        const f = e.target.files[0]; if (!f) return;
                        try {
                            const data = JSON.parse(await Utils.readFile(f, true));
                            if (Array.isArray(data)) { DB.clearBoard(); setTimeout(() => data.forEach(el => DB.pushElement(el)), 1000); AppEvents.emit('ui:toast', { m: "Loyiha muvaffaqiyatli yuklandi", t: "success" }); }
                        } catch (err) { AppEvents.emit('ui:toast', { m: "Fayl formati noto'g'ri", t: "error" }); } fileJson.value = '';
                    };
                    
                    document.getElementById('btn-submit-chat').onclick = () => this.sendChat();
                    document.getElementById('inp-chat-text').onkeypress = e => { if (e.key === 'Enter') this.sendChat(); };
                    
                    window.addEventListener('keydown', e => {
                        if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
                        const k = e.key.toLowerCase();
                        if (e.ctrlKey || e.metaKey) { if (k === 'z') { e.preventDefault(); DB.undo(); } }
                        else {
                            if (k === 'b') this.setTool('draw'); else if (k === 'e') this.setTool('erase'); else if (k === 'h') this.setTool('pan');
                            else if (k === 't') this.setTool('text'); else if (k === 'l') this.setTool('laser');
                            else if (k === 's') document.getElementById('toolbar-shapes').classList.toggle('is-visible');
                            else if (k === 'm') AudioSystem.toggle(); else if (k === 'c') this.openDrawer('drawer-chat');
                            else if (k === 'f') this.toggleFullscreen();
                        }
                    });
                }
                bindMinimapInteractions() {
                    const minimap = document.getElementById('minimap-widget'), header = document.getElementById('minimap-header'), resizer = document.getElementById('minimap-resize-handle');
                    const btnClose = document.getElementById('btn-close-minimap'), btnToggle = document.getElementById('act-toggle-minimap');
                    let isDragging = false, isResizing = false, startX, startY, startLeft, startTop, startW, startH;

                    header.addEventListener('pointerdown', e => {
                        if(e.target.closest('button')) return; e.preventDefault(); isDragging = true;
                        startX = e.clientX; startY = e.clientY; const rect = minimap.getBoundingClientRect(); startLeft = rect.left; startTop = rect.top;
                        minimap.style.bottom = 'auto'; minimap.style.right = 'auto'; minimap.style.left = `${startLeft}px`; minimap.style.top = `${startTop}px`;
                    });
                    resizer.addEventListener('pointerdown', e => {
                        e.preventDefault(); e.stopPropagation(); isResizing = true; startX = e.clientX; startY = e.clientY;
                        const rect = minimap.getBoundingClientRect(); startW = rect.width; startH = rect.height;
                        minimap.style.bottom = 'auto'; minimap.style.right = 'auto'; minimap.style.left = `${rect.left}px`; minimap.style.top = `${rect.top}px`;
                    });
                    window.addEventListener('pointermove', e => {
                        if (isDragging) {
                            let newLeft = Math.max(0, Math.min(startLeft + (e.clientX - startX), window.innerWidth - minimap.offsetWidth));
                            let newTop = Math.max(0, Math.min(startTop + (e.clientY - startY), window.innerHeight - minimap.offsetHeight));
                            minimap.style.left = `${newLeft}px`; minimap.style.top = `${newTop}px`;
                        } else if (isResizing) {
                            let newW = Math.max(150, Math.min(startW + (e.clientX - startX), window.innerWidth - minimap.offsetLeft));
                            let newH = Math.max(100, Math.min(startH + (e.clientY - startY), window.innerHeight - minimap.offsetTop));
                            minimap.style.width = `${newW}px`; minimap.style.height = `${newH}px`; Engine.resizeMinimap();
                        }
                    });
                    window.addEventListener('pointerup', () => { isDragging = false; isResizing = false; });
                    const toggleMinimap = () => {
                        Store.minimapVisible = !Store.minimapVisible;
                        if(Store.minimapVisible) { minimap.classList.remove('is-hidden'); Engine.resizeMinimap(); } else minimap.classList.add('is-hidden');
                    };
                    btnClose.addEventListener('click', () => toggleMinimap()); btnToggle.addEventListener('click', () => { toggleMinimap(); this.closeAll(); });
                }
                bindFullscreen() {
                    const btnFsDock = document.getElementById('btn-action-fullscreen'), btnFsExit = document.getElementById('btn-exit-zen');
                    this.toggleFullscreen = () => {
                        if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(() => AppEvents.emit('ui:toast', {m: "To'liq ekran rejimiga o'tib bo'lmadi", t: "warning"})); }
                        else if (document.exitFullscreen) document.exitFullscreen();
                    };
                    btnFsDock.addEventListener('click', this.toggleFullscreen); btnFsExit.addEventListener('click', this.toggleFullscreen);
                    document.addEventListener('fullscreenchange', () => {
                        Store.isFullscreen = !!document.fullscreenElement;
                        if(Store.isFullscreen) { document.body.classList.add('zen-mode'); btnFsDock.innerHTML = `<i data-lucide="minimize"></i>`; }
                        else { document.body.classList.remove('zen-mode'); btnFsDock.innerHTML = `<i data-lucide="maximize"></i>`; }
                        lucide.createIcons(); setTimeout(() => Engine.resize(), 100); 
                    });
                }
                handleAuth(isHost) {
                    const name = Utils.sanitize(document.getElementById('auth-name-inp').value.trim()).substring(0, 25);
                    if (!name) return AppEvents.emit('ui:toast', { m: "Ism kiriting", t: "error" });
                    let room = isHost ? `MR${Math.floor(1000 + Math.random() * 9000)}` : document.getElementById('auth-room-inp').value.trim().toUpperCase();
                    if (!room) return AppEvents.emit('ui:toast', { m: "Xona kodini kiriting", t: "error" });
                    
                    Store.name = name; Store.isHost = isHost; Store.roomId = room; if (isHost) Store.hostKey = Utils.generateId('K'); Utils.vibrate([15, 50, 15]);
                    const auth = document.getElementById('auth-gateway'); auth.style.opacity = '0';
                    setTimeout(() => {
                        auth.style.display = 'none'; document.getElementById('ui-overlay').style.display = 'block'; document.getElementById('ui-room-code').innerText = room;
                        if (isHost) { document.getElementById('btn-open-users').style.display = 'flex'; document.getElementById('panel-host-controls').style.display = 'block'; document.getElementById('ui-participants-list').classList.add('host-active'); }
                        AppEvents.emit('ui:role'); DB.init(room); Engine.init(); AudioSystem.init(); AppEvents.emit('ui:toast', { m: "Tizimga ulandingiz!", t: "success" });
                    }, 500);
                }
                setTool(tool) {
                    Utils.vibrate(10); Store.tool = tool;
                    document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('is-active')); document.querySelector(`[data-tool="${tool}"]`).classList.add('is-active');
                    const shapes = ['rect', 'circle', 'line', 'arrow'];
                    if (shapes.includes(tool)) document.getElementById('btn-toggle-shapes').classList.add('is-active'); else document.getElementById('btn-toggle-shapes').classList.remove('is-active');
                    if (!shapes.includes(tool)) document.getElementById('toolbar-shapes').classList.remove('is-visible');
                    document.getElementById('app-container').style.cursor = tool === 'pan' ? 'grab' : (tool === 'text' ? 'text' : 'crosshair');
                }
                openDrawer(id) {
                    Utils.vibrate(10); this.closeAll(); document.getElementById('drawer-backdrop').classList.add('is-visible'); document.getElementById(id).classList.add('is-open');
                    if (id === 'drawer-chat') { Store.unread = 0; document.getElementById('badge-chat-count').style.display = 'none'; setTimeout(() => document.getElementById('inp-chat-text').focus(), 300); }
                }
                closeAll() {
                    document.querySelectorAll('.drawer').forEach(d => d.classList.remove('is-open')); document.getElementById('drawer-backdrop').classList.remove('is-visible');
                    document.getElementById('toolbar-shapes').classList.remove('is-visible'); this.closeTextModal();
                }
                closeTextModal() { document.getElementById('modal-text-input').classList.remove('is-visible'); document.getElementById('inp-text-area').value = ''; Store.textCtx = null; if (!document.querySelector('.drawer.is-open')) document.getElementById('drawer-backdrop').classList.remove('is-visible'); }
                sendChat() {
                    if (Date.now() - Store.lastChat < 1000) return AppEvents.emit('ui:toast', { m: "Xabarlar tezligini pasaytiring", t: "warning" });
                    Store.lastChat = Date.now(); const msg = Utils.sanitize(document.getElementById('inp-chat-text').value.trim()).substring(0, 300);
                    if (msg) { DB.sendChat(msg); document.getElementById('inp-chat-text').value = ''; }
                }
                initColorWheel() {
                    const cvs = document.getElementById('cvs-color-picker'), ctx = cvs.getContext('2d'); let hue = 0.6, sat = 0.8, val = 1;
                    const drawWheel = () => {
                        const w = cvs.width, img = ctx.createImageData(w, w), data = img.data, r = w / 2;
                        for (let y = 0; y < w; y++) {
                            for (let x = 0; x < w; x++) {
                                const dx = x - r, dy = y - r, dist = Math.hypot(dx, dy);
                                if (dist <= r) {
                                    const h = (Math.atan2(dy, dx) + Math.PI) / (2 * Math.PI), s = dist / r;
                                    const rgb = this.hsvToRgb(h, s, 1), idx = (y * w + x) * 4;
                                    data[idx] = rgb.r; data[idx + 1] = rgb.g; data[idx + 2] = rgb.b; data[idx + 3] = 255;
                                }
                            }
                        } ctx.putImageData(img, 0, 0);
                    }; drawWheel();
                    const updateColor = () => {
                        const rgb = this.hsvToRgb(hue, sat, val), hex = `#${((1 << 24) + (rgb.r << 16) + (rgb.g << 8) + rgb.b).toString(16).slice(1)}`;
                        Store.color = hex; document.getElementById('ui-current-color').style.background = hex; this.setTool('draw');
                    };
                    const pick = e => {
                        const rect = cvs.getBoundingClientRect(), x = (e.clientX - rect.left) * (cvs.width / rect.width), y = (e.clientY - rect.top) * (cvs.height / rect.height);
                        const r = cvs.width / 2, dx = x - r, dy = y - r, dist = Math.hypot(dx, dy);
                        if (dist <= r) { hue = (Math.atan2(dy, dx) + Math.PI) / (2 * Math.PI); sat = dist / r; updateColor(); }
                    };
                    cvs.onpointerdown = pick; cvs.onpointermove = e => { if (e.buttons === 1) pick(e); };
                    document.getElementById('inp-color-bright').oninput = e => { val = e.target.value / 100; updateColor(); };
                    
                    const palette = document.getElementById('ui-quick-palette');
                    ['#ffffff', '#000000', '#64748b', '#ff3b30', '#ff9500', '#ffcc00', '#34c759', '#30b0c7', '#007aff', '#5856d6', '#af52de', '#ff2d55'].forEach(col => {
                        const sw = document.createElement('div'); sw.className = 'swatch-box'; sw.style.background = col;
                        sw.onclick = () => { Store.color = col; document.getElementById('ui-current-color').style.background = col; this.setTool('draw'); Utils.vibrate(10); };
                        palette.appendChild(sw);
                    });
                }
                hsvToRgb(h, s, v) {
                    let r, g, b; const i = Math.floor(h * 6), f = h * 6 - i, p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
                    switch (i % 6) { case 0: r=v; g=t; b=p; break; case 1: r=q; g=v; b=p; break; case 2: r=p; g=v; b=t; break; case 3: r=p; g=q; b=v; break; case 4: r=t; g=p; b=v; break; default: r=v; g=p; b=q; break; }
                    return { r: Math.round(r * 255), g: Math.round(g * 255), b: Math.round(b * 255) };
                }
                bindAppEvents() {
                    AppEvents.on('ui:zoom', () => { document.getElementById('ui-zoom-level').innerText = Math.round(Store.cam.z * 100) + '%'; });
                    AppEvents.on('ui:role', () => {
                        const el = document.getElementById('ui-user-role');
                        if (Store.isHost) el.innerHTML = '<i data-lucide="crown" style="color:var(--state-warning)"></i> Host';
                        else if (Store.perms.draw) el.innerHTML = '<i data-lucide="pencil" style="color:var(--brand-primary)"></i> Yozuvchi';
                        else el.innerHTML = '<i data-lucide="eye" style="color:var(--text-muted)"></i> Kuzatuvchi';
                        lucide.createIcons(); AppEvents.emit('ui:mic');
                    });
                    AppEvents.on('ui:mic', () => {
                        const btn = document.getElementById('btn-action-mic');
                        btn.className = 'action-btn ' + (!Store.perms.speak ? 'mic-off' : (Store.micActive ? 'mic-on is-active' : 'mic-off'));
                        btn.innerHTML = `<i data-lucide="${Store.micActive && Store.perms.speak ? 'mic' : 'mic-off'}"></i><span class="tooltip">Mikrofon (M)</span>`;
                        lucide.createIcons();
                    });
                    AppEvents.on('ui:modalText', pos => {
                        Store.textCtx = pos; document.getElementById('drawer-backdrop').classList.add('is-visible'); document.getElementById('modal-text-input').classList.add('is-visible');
                        setTimeout(() => document.getElementById('inp-text-area').focus(), 100);
                    });
                    AppEvents.on('ui:toast', data => {
                        Utils.vibrate(data.t === 'error' ? [50, 50, 50] : 15);
                        const wrap = document.getElementById('toast-wrapper'), toast = document.createElement('div'); toast.className = `toast-item ${data.t}`;
                        let icon = 'info'; if(data.t === 'error') icon = 'shield-alert'; if(data.t === 'success') icon = 'check-circle'; if(data.t === 'warning') icon = 'alert-triangle';
                        toast.innerHTML = `<i data-lucide="${icon}"></i><span>${data.m}</span>`; wrap.appendChild(toast); lucide.createIcons();
                        setTimeout(() => { toast.style.animation = 'none'; toast.style.opacity = '0'; toast.style.transform = 'translateY(-40px) scale(0.8)'; setTimeout(() => toast.remove(), 400); }, 4000);
                    });
                    AppEvents.on('ui:chat', msg => {
                        const container = document.getElementById('ui-chat-messages'), isMine = msg.u === Store.uid, bubble = document.createElement('div');
                        bubble.className = `msg-bubble ${isMine ? 'mine' : 'other'}`;
                        bubble.innerHTML = `<div class="msg-info">${Utils.sanitize(msg.n)} ${msg.h ? '<i data-lucide="crown" size="14" style="color:var(--state-warning)"></i>' : ''}</div><div>${Utils.sanitize(msg.m)}</div><div class="msg-time">${msg.tm}</div>`;
                        container.appendChild(bubble); lucide.createIcons(); container.scrollTop = container.scrollHeight;
                        if (!isMine && !document.getElementById('drawer-chat').classList.contains('is-open')) {
                            Store.unread++; const badge = document.getElementById('badge-chat-count'); badge.innerText = Store.unread > 9 ? '9+' : Store.unread;
                            badge.style.display = 'flex'; Utils.vibrate([10, 30, 10]);
                        }
                    });
                    AppEvents.on('ui:users', () => {
                        const list = document.getElementById('ui-participants-list'); let html = '', count = 0;
                        Object.values(Store.db.peers).forEach(p => {
                            if (p.h) return; count++;
                            html += `<div class="user-card"><div class="user-meta"><div class="avatar">${p.n.charAt(0).toUpperCase()}</div><span>${Utils.sanitize(p.n)}</span></div><div class="perm-actions"><button class="perm-btn ${p.d ? 'is-granted' : ''}" data-u="${p.id}" data-p="d" title="Chizishga ruxsat"><i data-lucide="pencil" size="18"></i></button><button class="perm-btn ${p.s ? 'is-granted' : ''}" data-u="${p.id}" data-p="s" title="Gapirishga ruxsat"><i data-lucide="mic" size="18"></i></button></div></div>`;
                        });
                        if (count === 0) html = `<div style="text-align:center; color:var(--text-muted); font-weight:800; margin-top:20px;">Qatnashchilar yo'q</div>`;
                        list.innerHTML = html; lucide.createIcons();
                        document.getElementById('badge-users-count').innerText = count; document.getElementById('badge-users-count').style.display = count > 0 ? 'flex' : 'none';
                        if (Store.isHost) { list.querySelectorAll('.perm-btn').forEach(btn => { btn.onclick = () => { DB.setPermission(btn.dataset.u, btn.dataset.p, !Store.db.peers[btn.dataset.u][btn.dataset.p]); Utils.vibrate(10); }; }); }
                    });
                }
            }

            const UI = new UIController();
        })();
    </script>
</body>
</html>
